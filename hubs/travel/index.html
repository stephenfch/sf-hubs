  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Klee+One&family=Inter:wght@300;400;600;700&family=Zen+Maru+Gothic:wght@300;400;500;700&display=swap');
    body {
      font-family: 'Noto Sans JP', 'Noto Sans SC', 'Zen Maru Gothic', 'Inter', system-ui, sans-serif;
      background-color: #FFF5F7;
    }
    /* === 可愛和風卡片 hover === */
    .card-hover {
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .card-hover:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 12px 40px rgba(236, 64, 122, 0.10);
    }

    /* === 天氣 tooltip === */
    .weather-badge[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%) scale(0.85);
      background: #5D4037;
      color: #FFF5F7;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .weather-badge[data-tip] { position: relative; display: inline-block; }
    .weather-badge[data-tip]:hover::after {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* === 可愛彩虹漸層標題 === */
    .gradient-text {
      background: linear-gradient(135deg, #EC407A, #AB47BC, #42A5F5, #66BB6A);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* === 日式分隔線（櫻花 style）=== */
    .wa-divider {
      height: 3px;
      background: linear-gradient(90deg, transparent, #F48FB1, #EC407A, #F48FB1, transparent);
      width: 100px;
      margin: 0 auto;
      border-radius: 3px;
    }

    /* === 和風 Scrollbar（粉系）=== */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #FCE4EC; }
    ::-webkit-scrollbar-thumb { background: #F8BBD0; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #F48FB1; }

    /* === 和風裝飾角（圓角可愛版）=== */
    .wa-corner {
      position: relative;
    }
    .wa-corner::before {
      content: '🌸';
      position: absolute;
      top: -8px;
      left: -6px;
      font-size: 16px;
      opacity: 0.5;
      pointer-events: none;
      animation: float 3s ease-in-out infinite;
    }
    .wa-corner::after {
      content: '🌸';
      position: absolute;
      bottom: -8px;
      right: -6px;
      font-size: 16px;
      opacity: 0.5;
      pointer-events: none;
      animation: float 3s ease-in-out 1.5s infinite;
    }

      position: relative;
      transition: color 0.2s;
      border-radius: 8px;
      padding: 6px 14px;
    }
    .tab-btn:hover {
      background: #FCE4EC;
    }

      background: #FCE4EC;
      color: #EC407A !important;
    }

      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 60%;
      height: 3px;
      background: linear-gradient(90deg, #F48FB1, #EC407A);
      border-radius: 3px;
      transition: transform 0.25s;
    }
    .tab-btn.active::after {
      transform: translateX(-50%) scaleX(1);
    }

        rgba(255, 245, 247, 0.35) 50%,
        rgba(255, 245, 247, 0.85) 80%,

      gap: 6px;

      width: 100%;
      height: 100px;

      border-radius: 10px;
      border: 2px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);

      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(236, 64, 122, 0.15);
    }

      border-radius: 16px;
      overflow: hidden;
      border: 3px solid #FCE4EC;
      box-shadow: 0 4px 20px rgba(236, 64, 122, 0.08);

  <script>// =============================================================================
// Travel Hub — app.js (和風輕亮版)
// 渲染 window.TRAVEL_DATA → trip 卡片 + 每日 itinerary + 景點 info + 📸加相 + 📔日誌
// Vanilla JS，zero dependency
// =============================================================================
(function () {
  "use strict";

  const DATA = window.TRAVEL_DATA || { trips: [] };

  // ---- Cloudflare Worker / KV config (方案 C) ------------------------------
  const JOURNAL_API = "https://travel-journal.stephenfch.workers.dev"; // ← CF Worker base URL

  /**
   * Fetch live journal entries from CF Worker KV, merge with static trip.journal.
   * Returns merged array sorted by day/time.
   */
  async function fetchLiveJournal(tripId, staticJournal) {
    try {
      const resp = await fetch(`${JOURNAL_API}/journal/${encodeURIComponent(tripId)}`);
      if (!resp.ok) return staticJournal.slice(); // fallback to static only
      const data = await resp.json();
      if (!data.entries || !Array.isArray(data.entries)) return staticJournal.slice();

      // Merge: dedup by (day + time + spot + caption + photo), prefer live
      const seen = new Set();
      const merged = [];
      // Live entries first (higher priority)
      data.entries.forEach((e) => {
        const sig = `${e.day}|${e.time}|${e.spot}|${e.caption}|${e.photo}`;
        if (!seen.has(sig)) { seen.add(sig); merged.push(e); }
      });
      // Static entries (lower priority — only if not already in live)
      staticJournal.forEach((e) => {
        const sig = `${e.day}|${e.time}|${e.spot}|${e.caption}|${e.photo}`;
        if (!seen.has(sig)) { seen.add(sig); merged.push(e); }
      });

      return merged.sort((a, b) => {
        if ((a.day || 0) !== (b.day || 0)) return (a.day || 0) - (b.day || 0);
        return String(a.time || "").localeCompare(String(b.time || ""));
      });
    } catch (err) {
      console.warn("[Journal] Worker fetch failed, using static only:", err.message);
      return staticJournal.slice();
    }
  }

  /**
   * POST a new journal entry to CF Worker KV.
   * Returns { ok, entry } on success, null on failure.
   */
  async function postJournalEntry(tripId, entry) {
    try {
      const resp = await fetch(`${JOURNAL_API}/journal/${encodeURIComponent(tripId)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          day: entry.day,
          time: entry.time,
          spot: entry.spot,
          caption: entry.caption || "",
          photo: entry.photo || "",
        }),
      });
      if (!resp.ok) {
        const errData = await resp.json().catch(() => ({}));
        console.warn("[Journal] POST failed:", resp.status, errData);
        return null;
      }
      return await resp.json();
    } catch (err) {
      console.warn("[Journal] POST error:", err.message);
      return null;
    }
  }

  function esc(s) {
    if (s === undefined || s === null) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }
  function escAttr(s) {
    if (s === undefined || s === null) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/"/g, "&quot;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");

  function statusMeta(s) {

  // 移除 emoji / 裝飾符號，拎出純地名做 Google Maps 搜尋 query
  function stripEmoji(s) {
    if (!s) return "";
    return String(s)
      .replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}\u{2B00}-\u{2BFF}\u{FE0F}]/gu, "")
      .replace(/[A-Za-z0-9]+\s*/g, "")
      .replace(/[（）()]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }
  function cleanQuery(title) {
    let t = String(title || "");
    const m = t.match(/[一-鿿぀-ヿ가-힯]{2,}/);
    if (m) return m[0];
    return stripEmoji(t) || t;

  // 全程路線總覽：KIX → 每日城市（Google Maps directions embed，免 API key）
  function buildOverview(trip) {
    const seen = new Set();
    const stops = [];
    (trip.days || []).forEach((d) => {
      const loc = String(d.location || "").split("→")[0].trim();
      if (loc && !seen.has(loc)) {
        seen.add(loc);

      }
    });
    const enc = encodeURIComponent;
    const saddr = enc("關西國際機場 Kansai Airport");
    const daddr = stops.map(enc).join("+to:");
    return `https://maps.google.com/maps?saddr=${saddr}&daddr=${daddr}&output=embed`;
  }

  // ---- 天氣 data / fetch（Open-Meteo free API）-----------------------------
  const WMO = {
    0:  { icon: "☀️", label: "晴朗" },
    1:  { icon: "🌤️", label: "大致晴朗" },
    2:  { icon: "⛅", label: "多雲" },
    3:  { icon: "☁️", label: "陰天" },
    45: { icon: "🌫️", label: "霧" },
    48: { icon: "🌫️", label: "霧凇" },
    51: { icon: "🌦️", label: "小毛毛雨" },
    53: { icon: "🌦️", label: "毛毛雨" },
    55: { icon: "🌦️", label: "大毛毛雨" },
    56: { icon: "🌦️", label: "凍毛毛雨" },
    57: { icon: "🌦️", label: "凍大毛毛雨" },
    61: { icon: "🌦️", label: "小雨" },
    63: { icon: "🌦️", label: "中雨" },
    65: { icon: "🌧️", label: "大雨" },
    66: { icon: "🌧️", label: "凍雨" },
    67: { icon: "🌧️", label: "凍大雨" },
    71: { icon: "🌨️", label: "小雪" },
    73: { icon: "🌨️", label: "中雪" },
    75: { icon: "❄️", label: "大雪" },
    77: { icon: "❄️", label: "雪粒" },
    80: { icon: "🌦️", label: "陣雨" },
    81: { icon: "🌦️", label: "中陣雨" },
    82: { icon: "🌦️", label: "大陣雨" },
    85: { icon: "❄️", label: "小陣雪" },
    86: { icon: "❄️", label: "大陣雪" },
    95: { icon: "⛈️", label: "雷暴" },
    96: { icon: "⛈️", label: "雷暴+雹" },
    99: { icon: "⛈️", label: "強雷暴+雹" },
  };
  const _weatherCache = {}; // "lat,lon|date" → promise of { icon, label, high, low }

  function resolveCoords(locStr, trip) {
    const coords = trip.weatherCoords || {};
    if (coords[locStr]) return coords[locStr];
    const parts = locStr.split(/[→,、\/\s]+/).filter(Boolean);
    for (const p of parts) {
      if (coords[p]) return coords[p];
    }
    for (const key of Object.keys(coords)) {
      if (locStr.includes(key)) return coords[key];
    }
    return null;
  }

  async function fetchWeather(lat, lon, dateStr) {
    const cacheKey = `${lat},${lon}|${dateStr}`;
    if (_weatherCache[cacheKey]) return _weatherCache[cacheKey];
    const promise = (async () => {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Asia%2FTokyo&start_date=${dateStr}&end_date=${dateStr}`;
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const day = data.daily;
        if (!day || !day.time || !day.time.length) throw new Error("no data");
        const wcode = day.weathercode[0];
        const w = WMO[wcode] || { icon: "🌡️", label: "未知" };
        return { icon: w.icon, label: w.label, high: day.temperature_2m_max[0], low: day.temperature_2m_min[0] };
      } catch (e) {
        console.warn("Weather fetch fail:", e);
        return null;
      }
    })();
    _weatherCache[cacheKey] = promise;
    return promise;
  }

  async function loadWeatherForTrip(trip) {
    if (!trip.days) return;
    const unique = {};
    trip.days.forEach((d) => {
      const coords = resolveCoords(d.location, trip);
      if (coords) {
        const key = `${coords.lat},${coords.lon}|${d.date}`;
        if (!unique[key]) unique[key] = { lat: coords.lat, lon: coords.lon, date: d.date, day: d.day };
      }
    });
    const results = await Promise.allSettled(
      Object.values(unique).map((u) => fetchWeather(u.lat, u.lon, u.date))
    );
    Object.values(unique).forEach((u, i) => {
      const badge = document.querySelector(`[data-weather="${u.day}"]`);
      if (!badge) return;
      const r = results[i];
      if (r.status === "fulfilled" && r.value) {
        badge.textContent = `${r.value.icon} ${r.value.high}°/${r.value.low}°`;
        badge.setAttribute("data-tip", `${r.value.label} · 最高 ${r.value.high}°C · 最低 ${r.value.low}°C`);
        badge.className = "weather-badge text-xs px-1.5 py-0.5 rounded bg-ao-50/70 text-ao/80 border border-ao-100/50 cursor-default relative";
      } else {
        badge.textContent = "🌡️ N/A";
        badge.className = "weather-badge text-xs px-1.5 py-0.5 rounded bg-sumi/5 text-sumi/40";
      }
    });
  }

    // ---- 旅行日誌（📔 獨立 tab）--------------------------------------------

      // ═══════════════════════════════════════════════════════════════════════

      // ─ 隱藏嘅 file input（capture 相機/相簿） ─

      // mobile: 優先開後鏡相機
      if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        fileInput.setAttribute('capture', 'environment');
      }
      // 自適應：desktop → 用 accept 揀 file；mobile → capture 會 override
      panes.journal.appendChild(fileInput);

      // ─ 加相 modal ─
      const modalOverlay = el("div", "fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm hidden");

        <div class="bg-white/95 border border-sakura-200/40 rounded-2xl p-5 max-w-md w-full mx-3 shadow-2xl max-h-[90vh] overflow-y-auto kawaii-card" onclick="event.stopPropagation()">
          <div class="flex items-center justify-between mb-4">

            <button id="btn-close-modal" class="w-7 h-7 flex items-center justify-center rounded-full bg-sumi/10 text-sumi/40 hover:bg-sumi/20 text-sm">✕</button>
          </div>

          </div>
          <!-- Re-select button -->

              <div class="flex items-center justify-between">
                <span class="text-xs font-medium text-ao-600">⚡ Imgur 上載 <span id="imgur-status" class="text-[10px] text-sumi/35 font-normal">(未設定)</span></span>
                <button id="btn-set-imgur" class="text-[10px] px-2 py-0.5 rounded border border-ao-200/50 text-ao-500 hover:bg-ao-50">🔑 設定 ID</button>
              </div>
              <div id="imgur-config-area" class="hidden mt-2">
                <input id="j-imgur-client-id" type="text" placeholder="Imgur Client-ID" class="w-full px-3 py-1.5 text-xs rounded-lg border border-mizu-200/50 bg-white/70 text-sumi/60 focus:outline-none focus:ring-2 focus:ring-mizu-200 mb-1" />
                <button id="btn-save-imgur" class="text-[10px] px-2 py-0.5 rounded bg-ao-100 text-ao-600 hover:bg-ao-200">💾 儲存</button>

          </div>
        </div>
      `;
      panes.journal.appendChild(modalOverlay);

      // ─ State ─
      let selectedFile = null;
      let base64Data = null;
      let uploadedUrl = "";

      // ─ Event: 開 file picker ─
      document.getElementById('btn-add-journal-photo').addEventListener('click', () => {
        fileInput.click();
      });
      // ─ Event: 刷新 (re-render journal from Worker) ─
      document.getElementById('btn-refresh-journal').addEventListener('click', () => {
        const jPane = panes.journal;
        jPane.innerHTML = `<div class="text-center text-sumi/30 py-8"><span class="loading-pulse">⏳ 載入中...</span></div>`;
        // Re-run renderJournal by clearing + calling openDetail again
        setTimeout(() => openDetail(trip.id), 100);
      });

      // ─ Event: 揀相 ─
      fileInput.addEventListener('change', (e) => {
        const f = e.target.files?.[0];
        if (!f) return;
        selectedFile = f;
        uploadedUrl = "";
        // Read as data URL for preview
        const reader = new FileReader();
        reader.onload = (ev) => {
          base64Data = ev.target.result;
          const previewArea = document.getElementById('photo-preview-area');
          previewArea.innerHTML = `<img src="${esc(base64Data)}" class="w-full max-h-64 object-contain rounded-lg" />`;
          document.getElementById('btn-reselect-photo').classList.remove('hidden');
          // Reset Imgur state
          document.getElementById('imgur-result').classList.add('hidden');
          document.getElementById('imgur-upload-progress').classList.add('hidden');
          document.getElementById('btn-copy-journal').disabled = false;
        };
        reader.readAsDataURL(f);
        // Open modal
        modalOverlay.classList.remove('hidden');
      });

      // ─ Re-select ─
      document.getElementById('btn-reselect-photo').addEventListener('click', () => {
        fileInput.click();
      });

      // ─ Close modal ─
      const closeModal = () => {

        document.getElementById('imgur-status').textContent = '(已設定 ✓)';
        document.getElementById('btn-upload-imgur').disabled = false;
      } else {
        document.getElementById('imgur-status').textContent = '(未設定 — 不需也可用)';
        document.getElementById('btn-upload-imgur').disabled = true;
      }

      // ─ Imgur settings toggle ─
      document.getElementById('btn-set-imgur').addEventListener('click', () => {
        const area = document.getElementById('imgur-config-area');
        area.classList.toggle('hidden');
        const existing = localStorage.getItem('imgur_client_id') || '';
        document.getElementById('j-imgur-client-id').value = existing;
      });

      // ─ Save Imgur Client-ID ─
      document.getElementById('btn-save-imgur').addEventListener('click', () => {
        const val = document.getElementById('j-imgur-client-id').value.trim();
        if (val) {
          localStorage.setItem('imgur_client_id', val);
          document.getElementById('imgur-status').textContent = '(已設定 ✓)';
          document.getElementById('btn-upload-imgur').disabled = false;
          document.getElementById('imgur-config-area').classList.add('hidden');

            document.getElementById('imgur-status').textContent = '(已設定 ✓)';
          }, 2000);
        }
      });

      // ─ Imgur Upload ─
      document.getElementById('btn-upload-imgur').addEventListener('click', async () => {
        if (!selectedFile) return;
        const cid = localStorage.getItem('imgur_client_id');
        if (!cid) { alert('請先設定 Imgur Client-ID'); return; }
        const progress = document.getElementById('imgur-upload-progress');
        progress.classList.remove('hidden');
        document.getElementById('btn-upload-imgur').disabled = true;
        try {
          const form = new FormData();
          form.append('image', selectedFile);
          const res = await fetch('https://api.imgur.com/3/image', {
            method: 'POST',
            headers: { 'Authorization': `Client-ID ${cid}` },
            body: form
          });
          const data = await res.json();
          if (data.success && data.data?.link) {
            uploadedUrl = data.data.link;
            document.getElementById('imgur-result').classList.remove('hidden');
            document.getElementById('imgur-result').textContent = `✅ 已上載 → ${uploadedUrl}`;
            // ── 自動同步到 Cloudflare Worker KV ──
            const day = parseInt(document.getElementById('j-day').value, 10);
            const spot = document.getElementById('j-spot').value.trim();
            const caption = document.getElementById('j-caption').value.trim();
            const now = new Date();
            const time = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            const entry = { day, time, spot: spot || "(未填)", caption: caption || "", photo: uploadedUrl };
            postJournalEntry(trip.id, entry).then((res) => {
              if (res && res.ok) {
                document.getElementById('imgur-result').textContent = `✅ 已同步 ☁️ → 共 ${res.total} 筆`;
                document.getElementById('btn-copy-journal').disabled = false;
              }
            }).catch(() => {});
            // ── /Worker KV sync ──
          } else {
            throw new Error(data.data?.error || 'Upload failed');
          }
        } catch (err) {
          document.getElementById('imgur-result').classList.remove('hidden');

      // ─ Generate & Copy ─

        const day = parseInt(document.getElementById('j-day').value, 10);

        const time = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

          time,

          document.getElementById('copy-toast').classList.remove('hidden');
          setTimeout(() => document.getElementById('copy-toast').classList.add('hidden'), 3000);
        }).catch(() => {
          // fallback: manual copy
          document.getElementById('btn-copy-to-clipboard').classList.remove('hidden');
        });
      });

      // ─ Manual copy fallback ─
      document.getElementById('btn-copy-to-clipboard').addEventListener('click', () => {
        const ta = document.getElementById('j-clipboard-text');
        ta.select();
        navigator.clipboard.writeText(ta.value).then(() => {
          document.getElementById('copy-toast').classList.remove('hidden');
          setTimeout(() => document.getElementById('copy-toast').classList.add('hidden'), 3000);
        });
      });

      // ─ 現有 journal entries ─
      if (!j.length) {
        panes.journal.appendChild(
          el("div", "text-center text-sumi/40 text-sm py-16",

        const photo = e.photo
          ? `<div class="mb-2 rounded-lg overflow-hidden border border-sakura-100/30"><a href="${esc(e.photo)}" target="_blank" rel="noopener"><img src="${esc(e.photo)}" class="w-full max-h-80 object-cover hover:opacity-95 transition" onerror="this.style.display='none'"/></a></div>`
          : "";
        const cap = e.caption ? `<div class="text-sm text-sumi/65 mt-1 leading-relaxed">${esc(e.caption)}</div>` : "";
        card.innerHTML = head + photo + cap;

      panes.journal.appendChild(wrap);
    })();

    // ---- packing: 行李清單 ----
    if (trip.packing && trip.packing.length) {
      const wrap = el("div", "space-y-4");
      trip.packing.forEach((cat) => {
        if (!cat.items || !cat.items.length) return;

    // ---- map pane: directions ↔ map toggle + all spots list ----
    (function renderMap() {
      // ─ helpers ─
      function extractParking(intro) {
        if (!intro) return null;
        const m = intro.match(/🅿️[^📸📷🔗]*/);
        return m ? m[0].trim() : null;

      function stripParkingFromIntro(intro) {
        if (!intro) return "";

      function gmUrl(title, url) {
        if (url && (url.startsWith("http://") || url.startsWith("https://"))) return url;
        return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(title || "")}`;
      }

      const days = trip.days || [];

      // ─ 旅程概要 header ─
      const seenStops = [];
      const seenSet = new Set();
      days.forEach((d) => {
        const loc = String(d.location || "").split(/[→,]/)[0].trim();
        if (loc && !seenSet.has(loc)) { seenSet.add(loc); seenStops.push({ day: d.day, city: loc, weekday: d.weekday }); }
      });
      const firstDay = days[0];
      const lastDay = days[days.length - 1];
      const startLoc = firstDay ? (String(firstDay.location || "").split(/[→,]/)[0].trim()) : "KIX";
      const endLoc = lastDay ? (String(lastDay.location || "").split(/[→,]/)[0].trim()) : "KIX";
      const totalDays = days.length;

      const summaryHeader = el("div", "bg-white/85 border border-sakura-200/30 rounded-xl p-5 mb-6 shadow-wa kawaii-card");
      summaryHeader.innerHTML = `
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
          <div>
            <span class="text-lg">🗺️</span>

          <div class="text-sm text-sumi/60 font-medium tracking-wide" style="font-family: 'Zen Maru Gothic', sans-serif;">
            <span class="text-aka font-bold">${esc(startLoc)}</span> ${"→ " + seenStops.slice(1).map(s => esc(s.city)).join(" → ")}
          </div>
        </div>
        <div class="mt-3 flex flex-wrap items-center gap-2 text-xs text-sumi/45">
          <span class="px-2 py-1 rounded-lg bg-sakura-50/70 border border-sakura-200/30">📅 ${totalDays}日${totalDays-1}夜</span>
          <span class="px-2 py-1 rounded-lg bg-matcha-50/70 border border-matcha-200/30">🇯🇵 ${esc(trip.region || "關西/中國地區")}</span>
          <span class="px-2 py-1 rounded-lg bg-mizu-50/70 border border-mizu-200/30">${esc(trip.transport || "")}</span>
        </div>
      `;
      panes.map.appendChild(summaryHeader);

      // ─ Google Maps embed with mode toggle ─
      const mapBanner = el("div", "relative overflow-hidden rounded-2xl map-embed mb-4");

      // Build mode URLs
      const directionsUrl = trip.mapEmbed || buildOverview(trip);
      // My Maps embed: Google My Maps（自訂 marker / 圖層 / 路線）
      const mymapsEmbed = trip.myMapsEmbed || `https://www.google.com/maps/d/u/0/embed?mid=1LuuiiWAbTEBuR2loYXmtRSgLz-vNYZE&ehbc=2E312F`;
      const mymapsViewer = trip.myMapsViewer || `https://www.google.com/maps/d/u/0/viewer?mid=1LuuiiWAbTEBuR2loYXmtRSgLz-vNYZE`;
      const mymapsUrl = mymapsEmbed + `&hl=zh-Hant&ll=35.0%2C134.3&z=8`;
      const mymapsUrlView = mymapsViewer + `?ll=35.0%2C134.3&z=8`;

      // ─ Map mode: Day-by-day 路線建立 ─
      function parseDestCity(loc) {
        // 取 location 嘅最後一個城市（destination / 住宿城市）
        if (!loc) return "";
        const parts = loc.split("→").map(s => s.trim()).filter(s => s);
        return parts[parts.length - 1] || "";
      }
      function parseOriginCity(loc) {
        // 取 location 嘅第一個城市（出發城市）
        if (!loc) return "";
        const parts = loc.split("→").map(s => s.trim()).filter(s => s);
        return parts[0] || "";
      }
      function buildDayRoute(trip, dayNum) {
        const d = (trip.days || []).find(x => x.day === dayNum);
        if (!d) return directionsUrl;
        const enc = encodeURIComponent;
        const destCity = parseDestCity(d.location);
        const originCity = parseOriginCity(d.location);
        const currentDayIdx = (trip.days || []).findIndex(x => x.day === dayNum);

        // 搵「上一個唔同嘅 destination city」作為起點
        let prevDest = "";
        for (let i = currentDayIdx - 1; i >= 0; i--) {
          const pd = parseDestCity(trip.days[i].location);
          if (pd && pd !== destCity) {
            prevDest = pd;
            break;
          }
        }

        // Day 1 或無上一個不同城市：show KIX → 當日目的地
        if (!prevDest) {
          const saddr = enc("關西國際機場 Kansai Airport");
          const daddr = enc(destCity + " Japan");
          return `https://maps.google.com/maps?saddr=${saddr}&daddr=${daddr}&output=embed`;
        }

        // 同一城市內活動（prevDest === destCity）
        if (prevDest === destCity) {
          const items = d.items || [];
          const spotQueries = items
            .filter(it => it.title && !it.title.includes("住：") && it.url && !it.title.includes("Dinner") && !it.title.includes("Hotel"))
            .slice(0, 3)
            .map(it => enc(it.title + " " + destCity + " Japan"));
          if (spotQueries.length > 0) {
            return `https://maps.google.com/maps?q=${spotQueries.join("+")}&output=embed`;
          }
          return `https://maps.google.com/maps?q=${enc(destCity + " Japan")}&output=embed`;
        }

        // 跨城市移動
        const saddr = enc(prevDest + " Japan");
        const daddr = enc(destCity + " Japan");
        return `https://maps.google.com/maps?saddr=${saddr}&daddr=${daddr}&output=embed`;
      }

      // ─ Mode description row ─

        <button data-map-mode="mymaps" class="map-toggle-btn px-3 py-1.5 text-xs font-medium rounded-xl bg-white/70 text-sumi/50 border border-sakura-200/30 hover:bg-sakura-50">🗺️ 自訂地圖</button>
        <button data-map-mode="daybyday" class="map-toggle-btn px-3 py-1.5 text-xs font-medium rounded-xl bg-white/70 text-sumi/50 border border-sakura-200/30 hover:bg-sakura-50">📅 每日</button>
      `;
      panes.map.appendChild(toggleWrap);

      // Day-by-day select panel
      const daySelectPanel = el("div", "flex flex-wrap gap-1.5 mb-2 hidden");
      daySelectPanel.id = "day-select-panel";
      daySelectPanel.innerHTML = `<span class="text-[10px] text-sumi/40 mr-1" style="font-family: 'Zen Maru Gothic', sans-serif;">Day</span>` +
        (trip.days || []).map(d => `
          <button data-day="${d.day}" class="day-select-btn text-xs px-2.5 py-1 rounded-lg bg-sakura-50/70 text-sumi/60 border border-sakura-200/30 hover:bg-sakura-100 hover:text-aka transition">${d.day}</button>
        `).join("");
      panes.map.appendChild(daySelectPanel);

      // ─ Loading spinner ─
      const mapLoader = el("div", "flex items-center justify-center rounded-2xl bg-sakura-50/50", "");
      mapLoader.id = "map-loader";
      mapLoader.innerHTML = `<div class="animate-pulse text-sakura-400 text-sm">🗺️ 載入中...</div>`;
      mapLoader.style.height = window.innerWidth < 640 ? "300px" : "min(65vh, 600px)";
      panes.map.appendChild(mapLoader);

      const iframeWrap = el("div", "w-full");
      iframeWrap.innerHTML = `
        <iframe id="map-iframe-directions"
          width="100%"
          height="${window.innerWidth < 640 ? 300 : Math.min(window.innerHeight * 0.65, 600)}"
          style="border:0; display:none;"
          allowfullscreen=""
          loading="eager"
          referrerpolicy="no-referrer-when-downgrade"
          title="Directions Map"
          data-src="${escAttr(directionsUrl)}"
        ></iframe>
        <iframe id="map-iframe-mymaps"
          width="100%"
          height="${window.innerWidth < 640 ? 300 : Math.min(window.innerHeight * 0.65, 600)}"
          style="border:0; display:none;"
          allowfullscreen=""
          loading="eager"
          referrerpolicy="no-referrer-when-downgrade"
          title="Custom Map"
          data-src="${escAttr(mymapsUrl)}"
        ></iframe>
        <iframe id="map-iframe-daybyday"
          width="100%"
          height="${window.innerWidth < 640 ? 300 : Math.min(window.innerHeight * 0.65, 600)}"
          style="border:0; display:none;"
          allowfullscreen=""
          loading="eager"
          referrerpolicy="no-referrer-when-downgrade"
          title="Day-by-day Map"
        ></iframe>
      `;
      panes.map.appendChild(iframeWrap);

      const iframes = {
        directions: iframeWrap.querySelector('#map-iframe-directions'),
        mymaps: iframeWrap.querySelector('#map-iframe-mymaps'),
        daybyday: iframeWrap.querySelector('#map-iframe-daybyday'),
      };

      // ─ 共用 resize handler ─
      const updateMapHeight = function() {
        const h = window.innerWidth < 640 ? 340 : Math.min(window.innerHeight * 0.65, 600);
        Object.values(iframes).forEach(f => { if (f) f.style.height = h + "px"; });

      };
      updateMapHeight();
      window.addEventListener('resize', updateMapHeight);

      // ─ 每個 iframe 各自 loading handler ─
      Object.entries(iframes).forEach(([, f]) => {
        if (!f) return;
        // 從 data-src 讀取 src（等於可以 lazy init）
        if (f.dataset.src) {
          f.src = f.dataset.src;
          delete f.dataset.src;
        }
        f.addEventListener('load', () => {
          // 只處理當前 visible 嘅 iframe
          if (f.style.display !== 'none') {
            mapLoader.style.display = 'none';
          }
        });
      });

      // ─ 共用 helper：切 iframe display ─

          try {
            if (activeIframe.contentDocument && activeIframe.contentDocument.body) {
              mapLoader.style.display = 'none';

      const modeDescriptions = {

          // Show/hide ✏️ 編輯地圖 + 📱 手機開
          myMapsActions.style.display = mode === "mymaps" ? "flex" : "none";
          // Show/hide day selector
          if (mode === "daybyday") {
            daySelectPanel.classList.remove("hidden");
          } else {
            daySelectPanel.classList.add("hidden");
          }
          // Show loader, hide iframe — but now we just showMapMode
          showMapMode(mode);
          let src = "";
          if (mode === "directions") src = directionsUrl;
          else if (mode === "mymaps") src = mymapsUrl;
          // daybyday: src stays as-is, handled by day select
          if (iframes[mode] && iframes[mode].src !== src && src) {
            iframes[mode].src = src;
          }
          // ─ URL hash persistence ─
          try { history.replaceState(null, "", "#mapmode=" + mode); } catch(e) {}
        });
      });

      // Day-by-day select logic
      daySelectPanel.querySelectorAll(".day-select-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const dayNum = parseInt(btn.dataset.day, 10);
          daySelectPanel.querySelectorAll(".day-select-btn").forEach(b => {
            const active = parseInt(b.dataset.day, 10) === dayNum;
            b.className = `day-select-btn text-xs px-2.5 py-1 rounded-lg ${active ? "bg-sakura-100 text-aka border border-sakura-200/50 shadow-sm" : "bg-sakura-50/70 text-sumi/60 border border-sakura-200/30 hover:bg-sakura-100 hover:text-aka transition"}`;
          });
          iframes.daybyday.src = buildDayRoute(trip, dayNum);
        });
      });

      // ─ 途經城市 badges ─
      const citySection = el("div", "bg-white/85 border border-sakura-200/30 rounded-xl p-5 mb-6 shadow-wa kawaii-card");
      citySection.innerHTML = `
        <div class="flex items-center gap-2 mb-4">
          <span class="text-base">📍</span>
          <span class="text-sm font-bold text-sumi/70" style="font-family: 'Klee One', cursive;">途經站點</span>
        </div>
        <div class="flex flex-wrap items-center gap-2" style="font-family: 'Zen Maru Gothic', sans-serif;">
          ${(() => {
            let html = `<span class="text-xs text-sumi/50 font-bold">🏁 ${esc(startLoc)}</span>`;
            seenStops.forEach((s, i) => {
              if (i === 0 && s.city === startLoc) return;
              html += `<span class="text-sumi/30">→</span><button data-goto-day="${s.day}" class="px-3 py-1.5 rounded-lg bg-sakura-50/70 text-sumi/65 text-sm font-medium border border-sakura-200/40 hover:bg-sakura-100 hover:text-aka transition shadow-sm" style="font-family: 'Klee One', cursive;">${esc(s.city)} <span class="text-[10px] text-sumi/30 ml-0.5">D${s.day}</span></button>`;
            });
            html += `<span class="text-sumi/30">→</span><span class="text-xs text-sumi/50 font-bold">🏁 ${esc(endLoc)}</span>`;
            return html;
          })()}
        </div>
      `;
      citySection.querySelectorAll("[data-goto-day]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const targetDay = parseInt(btn.dataset.gotoDay, 10);
          switchTab("itinerary");
          const dayDots = panes.itinerary.querySelectorAll(".day-badge");
          dayDots.forEach((dot) => {
            if (parseInt(dot.textContent.trim(), 10) === targetDay) {
              dot.closest(".relative.mb-8")?.scrollIntoView({ behavior: "smooth", block: "start" });
            }
          });
        });
      });
      panes.map.appendChild(citySection);

      // ─ 全景點列表（Day-grouped, mapcode + 🅿️ + 🔗） ─
      const spotsSection = el("div", "bg-white/85 border border-sakura-200/30 rounded-xl p-5 shadow-wa kawaii-card");
      spotsSection.innerHTML = `<div class="flex items-center gap-2 mb-4">
        <span class="text-base">📋</span>
        <span class="text-sm font-bold text-sumi/70" style="font-family: 'Klee One', cursive;">全景點一覽（點對點車程）</span>
        <span class="text-[10px] text-sumi/30 ml-auto">${(() => {
          let total = 0;
          days.forEach(d => total += (d.items || []).length);
          return total + " 個景點";
        })()}</span>
      </div>`;
      const spotsList = el("div", "space-y-2");
      days.forEach((d, di) => {
        const items = d.items || [];
        if (!items.length) return;
        const group = el("div", "border border-sakura-100/40 rounded-xl overflow-hidden");
        // Day group header — collapsible
        const headerRow = el("button", "w-full flex items-center justify-between gap-2 px-4 py-2.5 bg-gradient-to-r from-sakura-50/60 to-transparent hover:from-sakura-100/60 transition text-left cursor-pointer");
        // 車程顯示（用 destination city）
        let driveHtml = "";
        if (di > 0) {
          const prevDest = parseDestCity(days[di - 1].location);
          const currentDest = parseDestCity(d.location);
          const driveKey = prevDest + "→" + currentDest;
          const driveKeyRev = currentDest + "→" + prevDest;
          const driveTime = (trip.cityDrives && trip.cityDrives[driveKey]) || (trip.cityDrives && trip.cityDrives[driveKeyRev]) || null;
          if (driveTime && prevDest !== currentDest) {
            driveHtml = `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-mizu-50/80 text-[10px] text-ao-600 font-medium border border-mizu-200/40">🚗 上一站：${esc(prevDest)} → ${esc(currentDest)} ≈ ${esc(driveTime)}</span>`;
          }
        }
        headerRow.innerHTML = `
          <div class="flex items-center gap-2">
            <span class="day-badge-sm inline-flex items-center justify-center w-7 h-7 rounded-full bg-gradient-to-br from-sakura-300 to-aka text-white text-xs font-bold shadow-sm" style="font-family: 'Klee One', cursive;">${d.day}</span>
            <span class="text-sm font-medium text-sumi/70" style="font-family: 'Klee One', cursive;">${esc(d.title)}</span>
            <span class="text-[10px] text-sumi/30">${fmtDate(d.date)} (${esc(d.weekday || "")}) · 📍 ${esc(d.location || "")}</span>
            ${driveHtml}
          </div>
          <span class="collapse-icon text-sumi/30 transition-transform">▼</span>
        `;
        const bodyWrap = el("div", "");
        bodyWrap.innerHTML = `<div class="px-4 py-3 space-y-2">${items.map((it) => {
          const mcHtml = (it.info && it.info.mapcode)
            ? `<a href="${mapcodeUrl(it.info.mapcode)}" target="_blank" rel="noopener" class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded bg-ao-50/70 text-[10px] text-ao hover:bg-ao-100 font-mono">🧭 ${esc(it.info.mapcode)} ↗</a>`
            : `<span class="inline-flex items-center px-1.5 py-0.5 rounded bg-sumi/5 text-[10px] text-sumi/30 font-mono">🧭 —</span>`;
          const parking = it.info ? extractParking(it.info.intro) : null;
          const parkingHtml = parking
            ? `<span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded bg-kinako-50/80 text-[10px] text-sumi/60" title="${esc(parking)}">🅿️ ${esc(parking.replace(/🅿️/, "").substring(0, 30))}</span>`
            : `<span class="inline-flex items-center px-1.5 py-0.5 rounded bg-sumi/5 text-[10px] text-sumi/30">🅿️ —</span>`;
          const gmUrl2 = it.url && (it.url.startsWith("http://") || it.url.startsWith("https://"))
            ? it.url
            : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(it.title + " " + (d.location || ""))}`;
          const gmHtml = `<a href="${esc(gmUrl2)}" target="_blank" rel="noopener" class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded bg-matcha-50/70 text-[10px] text-matcha-400 hover:bg-matcha-100">🗺️ Google Maps ↗</a>`;
          // 🆕 點對點車程 badge（來自 data.js item.drive field）
          const driveHtml2 = it.drive
            ? `<span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded bg-aka-50/70 text-[10px] text-aka font-medium" title="由上一個景點車程">🚗 ${esc(it.drive)}</span>`
            : "";
          // intro snippet
          const introClean = it.info ? stripParkingFromIntro(it.info.intro) : "";
          const introSnippet = introClean ? `<span class="text-[10px] text-sumi/40 leading-relaxed block mt-1">${esc(introClean.substring(0, 80))}${introClean.length > 80 ? "…" : ""}</span>` : "";
          return `<div class="flex flex-wrap items-center gap-1.5 pb-2 border-b border-sakura-100/20 last:border-0">
            <span class="text-sm text-sumi/15 w-4 shrink-0">${items.indexOf(it) + 1}.</span>
            <span class="text-xs font-medium text-sumi/75 flex-1 min-w-0" title="${esc(it.title)}">${esc(it.title)}</span>
            <div class="flex items-center gap-1 flex-wrap">
              ${driveHtml2}
              ${mcHtml}
              ${parkingHtml}
              ${gmHtml}
            </div>
            ${introSnippet ? `<div class="w-full pl-6">${introSnippet}</div>` : ""}
          </div>`;
        }).join("")}</div>`;

        let expanded = true;
        bodyWrap.style.display = "";
        headerRow.addEventListener("click", () => {
          expanded = !expanded;
          bodyWrap.style.display = expanded ? "" : "none";
          headerRow.querySelector(".collapse-icon").style.transform = expanded ? "rotate(0deg)" : "rotate(-90deg)";
        });

        group.appendChild(headerRow);
        group.appendChild(bodyWrap);
        spotsList.appendChild(group);
      });
      spotsSection.appendChild(spotsList);
      panes.map.appendChild(spotsSection);

      if (trip.mapNote) {
        const note = el("div", "text-xs text-sumi/40 mt-2 text-center");
        note.textContent = trip.mapNote;
        panes.map.appendChild(note);
      }
    })();

    } // END: openDetail(tripId)

    // ✨ 啟動：render trip cards
    console.log("[TravelHub] booting, trips=" + DATA.trips.length);
    renderTrips(document.getElementById("trip-grid"));

    // 顯示 trip count
    const tc = document.getElementById('trip-count');
    if (tc) tc.textContent = DATA.trips.length + ' 個旅程';
  })();</script>
</body>
</html>
