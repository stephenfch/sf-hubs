<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Hub | SF-HUBS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#0a0a0f',
            card: '#12121a',
            accent: '#6366f1',
            glow: '#818cf8',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.15);
    }
    .card-hover { transition: all 0.3s ease; }
    /* Custom tooltip: weather badge hover */
    .weather-badge[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: #1e1e2e;
      color: #e2e8f0;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(99,102,241,0.3);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
      z-index: 50;
    }
    .weather-badge[data-tip] { position: relative; }
    .weather-badge[data-tip]:hover::after,
    .weather-badge[data-tip]:active::after,
    .weather-badge[data-tip]:focus::after {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }
    .gradient-text {
      background: linear-gradient(135deg, #818cf8, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .grid-bg {
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
  </style>
</head>
<body class="bg-dark text-white min-h-screen grid-bg">

  <!-- Header -->
  <header class="border-b border-white/5 sticky top-0 z-20 bg-dark/90 backdrop-blur">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="../../" class="flex items-center gap-3 hover:opacity-80 transition">
          <div class="w-9 h-9 rounded-lg bg-accent flex items-center justify-center font-bold text-sm">SF</div>
          <span class="font-bold text-lg tracking-tight">SF-HUBS</span>
        </a>
        <span class="text-white/20">/</span>
        <span class="text-sm text-white/60 flex items-center gap-1">✈️ Travel</span>
      </div>
      <span id="data-updated" class="text-white/30 text-xs"></span>
    </div>
  </header>

  <!-- List View -->
  <main id="view-list">
    <!-- Hero -->
    <section class="max-w-6xl mx-auto px-6 pt-16 pb-10 text-center">
      <h1 class="text-4xl md:text-5xl font-black tracking-tight mb-3">
        <span class="gradient-text">Travel Hub</span>
      </h1>
      <p class="text-white/50 text-base md:text-lg max-w-xl mx-auto">
        旅行資料 · 行程一覽 · 風險提示 — 輕輕一 click 睇晒成個旅程。
      </p>
    </section>

    <!-- Trip Cards -->
    <section class="max-w-6xl mx-auto px-6 pb-24">
      <div id="trip-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
        <!-- rendered by app.js -->
      </div>
    </section>
  </main>

  <!-- Detail View -->
  <main id="view-detail" class="hidden max-w-5xl mx-auto px-6 py-8 pb-24">
    <!-- rendered by app.js -->
  </main>

  <!-- Footer -->
  <footer class="border-t border-white/5 py-8 text-center text-white/20 text-xs">
    <p>Powered by <span class="text-white/40">QwenPaw</span> &amp; <span class="text-white/40">Hermes</span> · © 2026 Stephen Fan</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
