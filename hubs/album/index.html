<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album Hub 🖼️ | SF-HUBS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#0a0a0f', card: '#12121a', accent: '#6366f1', glow: '#818cf8',
            surf: '#1a1a24'
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    /* ── Global (Light Theme) ── */
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(170deg, #faf8f5 0%, #f0ece6 30%, #f7f3ec 60%, #fcf9f5 100%);
      background-attachment: fixed;
      color: #3d3929;
      -webkit-tap-highlight-color: transparent;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(236, 64, 122, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 75%, rgba(66, 165, 245, 0.05) 0%, transparent 45%),
        radial-gradient(ellipse at 10% 90%, rgba(129, 199, 132, 0.04) 0%, transparent 40%);
    }
    /* ── Animations ── */
    .fade-in { animation: fadeIn 0.45s cubic-bezier(0.16,1,0.3,1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes toastBounce {
      0% { transform: translateY(30px) scale(0.9); opacity: 0; }
      50% { transform: translateY(-4px) scale(1.02); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes progressPulse { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }
    /* ── Card hover ── */
    .card-hover { transition: all 0.3s cubic-bezier(0.16,1,0.3,1); }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(236,64,122,0.12); }
    /* ── Photo Grid ── */
    .photo-grid {
      columns: 4 200px;
      column-gap: 12px;
    }
    .photo-grid > div {
      break-inside: avoid;
      margin-bottom: 12px;
    }
    .photo-grid img {
      width: 100%;
      border-radius: 12px;
      display: block;
      transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .photo-grid img:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 30px rgba(236,64,122,0.2);
    }
    /* ── Delete button ── */
    .photo-card { position: relative; }
    .photo-card .del-btn {
      position: absolute; top: 8px; right: 8px;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,0.85); color: #e53e3e;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; opacity: 0; transform: scale(0.8);
      transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
      cursor: pointer; border: none; z-index: 2;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .photo-card:hover .del-btn, .photo-card .del-btn.show-mobile { opacity: 1; transform: scale(1); }
    .photo-card .del-btn:hover { background: rgba(229,62,62,0.9); color: white; transform: scale(1.1); }
    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.94);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.2s ease-out;
    }
    .lightbox img {
      max-width: 92vw; max-height: 90vh;
      border-radius: 12px;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform 0.15s ease-out;
    }
    .lightbox .close { position: absolute; top: 16px; right: 20px; font-size: 36px; color: white; opacity: 0.5; cursor: pointer; z-index: 1; transition: opacity 0.2s; line-height: 1; }
    .lightbox .close:hover { opacity: 1; }
    .lightbox .caption { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.85); font-size: 14px; text-align: center; max-width: 80vw; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
    .lightbox .nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 44px; color: rgba(255,255,255,0.4);
      cursor: pointer; padding: 16px 8px; user-select: none; z-index: 1;
      transition: color 0.2s;
    }
    .lightbox .nav:hover { color: white; }
    .lightbox .nav.prev { left: 4px; }
    .lightbox .nav.next { right: 4px; }
    .lightbox .dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 1; }
    .lightbox .dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: all 0.2s; }
    .lightbox .dots span.active { background: white; transform: scale(1.3); }
    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed rgba(236,64,122,0.25);
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
      cursor: pointer;
      background: rgba(236,64,122,0.02);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #ec407a;
      background: rgba(236,64,122,0.06);
      transform: scale(1.01);
    }
    .upload-zone.drag-over { border-style: solid; box-shadow: 0 0 30px rgba(236,64,122,0.1); }
    /* ── Progress bar ── */
    .progress-bar {
      height: 4px; border-radius: 2px;
      background: linear-gradient(90deg, #ec407a, #f48fb1, #ec407a);
      background-size: 200% 100%;
      animation: shimmer 1.5s linear infinite, progressPulse 1s ease-in-out infinite;
      transition: width 0.3s ease-out;
    }
    /* ── Skeleton ── */
    .skeleton {
      animation: pulse 1.5s ease-in-out infinite;
      background: linear-gradient(135deg, #f0ede6 25%, #e8e2d8 50%, #f0ede6 75%);
      background-size: 200% 100%;
      border-radius: 12px;
    }
    /* ── Spinner ── */
    .spinner {
      width: 22px; height: 22px; border: 2.5px solid rgba(0,0,0,0.08);
      border-top-color: #ec407a; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 70;
      background: rgba(255,255,255,0.97); color: #3d3929;
      padding: 14px 22px; border-radius: 12px; font-size: 13.5px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 0 0 1px rgba(236,64,122,0.15);
      backdrop-filter: blur(16px);
      animation: toastBounce 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    #undo-toast {
      background: rgba(255,255,255,0.98);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 1px rgba(236,64,122,0.2);
    }
    /* ── Nav hamburger ── */
    .nav-links { display: flex; align-items: center; gap: 8px; }
    .hamburger { display: none; background: none; border: none; color: #3d3929; font-size: 22px; cursor: pointer; padding: 4px; }
    /* ── Mobile ── */
    @media (max-width: 768px) {
      .photo-grid { columns: 2 160px; column-gap: 8px; }
      .photo-grid > div { margin-bottom: 8px; }
      .photo-grid img { border-radius: 10px; }
      .photo-card .del-btn { opacity: 0.7; width: 28px; height: 28px; font-size: 12px; }
      .upload-zone { padding: 24px 14px; border-radius: 14px; }
      .upload-zone p { font-size: 13px; }
      .toast { left: 16px; right: 16px; bottom: 16px; font-size: 12.5px; text-align: center; }
      #undo-toast { flex-direction: column; gap: 8px; }
      .lightbox .nav { font-size: 36px; padding: 12px 4px; }
      .lightbox .close { top: 12px; right: 14px; font-size: 28px; }
      .lightbox .caption { bottom: 40px; font-size: 12px; }
      .hamburger { display: block; }
      .nav-links { display: none; }
      .nav-links.open { display: flex; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(12px); padding: 12px 20px; border-bottom: 1px solid rgba(255,150,50,0.15); gap: 8px; }
      main { padding-left: 12px; padding-right: 12px; }
      #btn-upload { padding: 12px 20px; font-size: 14px; min-height: 46px; border-radius: 14px; }
      #btn-do-upload { padding: 10px 18px; font-size: 13px; min-height: 42px; }
    }
    @media (max-width: 480px) {
      .photo-grid { columns: 1; column-gap: 0; }
      .photo-grid > div { margin-bottom: 12px; }
      main { padding: 12px 8px 80px; }
      .upload-zone { padding: 20px 10px; }
      .lightbox .nav { font-size: 28px; padding: 10px 2px; }
    }
  </style>
</head>
<body class="bg-white/0 text-gray-700 min-h-screen">

  <!-- ═══ Nav ═══ -->
  <nav class="border-b border-amber-200/40 px-6 py-4 flex items-center gap-2 sticky top-0 bg-white/80 backdrop-blur z-20 relative shadow-sm">
    <button class="hamburger" id="hamburger" title="Menu">☰</button>
    <div class="nav-links" id="nav-links">
      <a href="../../" class="text-gray-400 hover:text-gray-700 transition text-sm">← SF-HUBS</a>
      <span class="text-gray-300">/</span>
      <span class="text-sm font-semibold flex items-center gap-1.5 text-gray-800">🖼️ Album Hub</span>
    </div>
    <span class="ml-auto text-gray-400 text-xs" id="status">載入中…</span>
  </nav>

  <!-- ═══ Main ═══ -->
  <main class="max-w-6xl mx-auto px-6 py-8 pb-24">

    <!-- ── Trip Selector ── -->
    <section id="section-select" class="mb-8 fade-in">
      <h2 class="text-lg font-semibold mb-4 flex items-center gap-2 text-gray-800">
        <span>📂</span> 選擇旅程
      </h2>
      <div id="trip-list" class="flex flex-wrap gap-3">
        <!-- rendered by JS -->
      </div>
      <div id="no-trips" class="hidden text-gray-400 text-sm mt-4">
        <p>📭 暫無相簿 — 上載第一張相就會自動建立 trip folder</p>
      </div>
    </section>

    <!-- ── Upload Bar ── -->
    <section id="section-upload" class="hidden mb-8 fade-in">
      <div class="flex items-center gap-4 flex-wrap">
        <button id="btn-upload" class="px-5 py-2.5 rounded-xl bg-pink-500 text-white text-sm font-medium hover:bg-pink-600 transition flex items-center gap-2 shadow-lg shadow-pink-200">
          📤 上載相片
        </button>
        <span class="text-gray-400 text-xs">
          支援 JPG/PNG/WebP/HEIC · 拖放或點擊上載
        </span>
        <span id="photo-count" class="text-gray-300 text-xs ml-auto"></span>
      </div>
      <!-- Upload modal area -->
      <div id="upload-panel" class="hidden mt-4 p-4 bg-white/90 border border-amber-100 rounded-2xl fade-in shadow-sm backdrop-blur">
        <div class="upload-zone" id="drop-zone">
          <p class="text-gray-500 text-sm mb-1">📁 拖放相片到此處，或點擊選擇檔案</p>
          <p class="text-gray-300 text-xs">一次可揀多張 · 每張最大 50MB</p>
          <input type="file" id="file-input" multiple accept="image/*" class="hidden">
        </div>
        <!-- Upload form fields -->
        <div class="mt-3 flex flex-wrap gap-3">
          <div class="flex-1 min-w-[120px]">
            <label class="text-xs text-gray-400">Day # (optional)</label>
            <input id="upload-day" type="number" min="1" max="30" placeholder="e.g. 1" class="w-full mt-1 bg-amber-50/50 border border-amber-200 rounded-lg px-3 py-2 text-sm text-gray-700 outline-none focus:border-pink-300">
          </div>
          <div class="flex-1 min-w-[120px]">
            <label class="text-xs text-gray-400">景點 (optional)</label>
            <input id="upload-spot" type="text" placeholder="e.g. 神戶牛" class="w-full mt-1 bg-amber-50/50 border border-amber-200 rounded-lg px-3 py-2 text-sm text-gray-700 outline-none focus:border-pink-300">
          </div>
          <div class="flex-[2] min-w-[200px]">
            <label class="text-xs text-gray-400">Caption (optional)</label>
            <input id="upload-caption" type="text" placeholder="一句話描述…" class="w-full mt-1 bg-amber-50/50 border border-amber-200 rounded-lg px-3 py-2 text-sm text-gray-700 outline-none focus:border-pink-300">
          </div>
        </div>
        <div class="mt-3 flex items-center gap-3">
          <button id="btn-do-upload" class="px-4 py-2 rounded-lg bg-pink-500 text-white text-sm font-medium hover:bg-pink-600 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
            ⬆️ 上載所選檔案
          </button>
          <div id="upload-progress-wrap" class="hidden flex-1">
            <div class="flex items-center gap-2 mb-1">
              <div class="spinner"></div>
              <span id="upload-progress" class="text-gray-500 text-xs"></span>
            </div>
            <div class="progress-bar" id="progress-bar" style="width: 0%;"></div>
          </div>
          <span id="file-count" class="text-gray-300 text-xs">未選擇檔案</span>
        </div>
        <!-- Thumbnail preview of selected files -->
        <div id="preview-row" class="flex flex-wrap gap-2 mt-3"></div>
      </div>
    </section>

    <!-- ── Photo Grid ── -->
    <section id="section-photos" class="hidden fade-in">
      <div id="photo-grid" class="photo-grid">
        <!-- rendered by JS -->
      </div>
      <div id="photo-empty" class="hidden text-center py-16 text-gray-300">
        <p class="text-4xl mb-3">📸</p>
        <p class="text-sm">呢個 trip 暫時未有相</p>
        <p class="text-xs mt-1">click 上面「上載相片」開始！</p>
      </div>
    </section>

  </main>

  <!-- ═══ Lightbox (hidden) ═══ -->
  <div id="lightbox" class="lightbox hidden" style="display:none;">
    <span class="close" id="lb-close">&times;</span>
    <span class="nav prev" id="lb-prev">‹</span>
    <img id="lb-img" src="" alt="">
    <span class="nav next" id="lb-next">›</span>
    <div class="dots" id="lb-dots"></div>
    <div class="caption" id="lb-caption"></div>
  </div>

  <!-- ═══ Footer ═══ -->
  <footer class="border-t border-amber-100 py-8 text-center text-gray-400 text-xs">
    <p>Powered by <span class="text-gray-600">SF-HUBS</span> · © 2026 Stephen Fan</p>
  </footer>

  <!-- ═══════════════════════════════════════════════════════════════════════
       App Logic — Vanilla JS
       ═══════════════════════════════════════════════════════════════════════ -->
  <script>
  (function () {
    "use strict";

    // ── Config ──
    // Auto-detect API base: if served from sf-hubs.dev, use album.sf-hubs.dev
    // otherwise fall back to localhost:5300 for dev
    const API = (() => {
      if (location.hostname === "sf-hubs.dev" || location.hostname.endsWith(".pages.dev")) {
        return "https://album.sf-hubs.dev";
      }
      return "http://127.0.0.1:5300";
    })();

    // ── State ──
    let currentTrip = null;
    let currentPhotos = [];
    let selectedFiles = [];     // File objects for pending upload
    let lightboxIdx = -1;

    // ── DOM refs ──
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    // ── Init ──
    async function init() {
      // Check for ?trip= query param
      const params = new URLSearchParams(location.search);
      const tripParam = params.get("trip");

      await loadTrips();
      if (tripParam) {
        selectTrip(tripParam);
      }

      $("#status").textContent = `API: ${API}`;
    }

    // ── Load trips ──
    async function loadTrips() {
      const list = $("#trip-list");
      const noTrips = $("#no-trips");
      try {
        const resp = await fetch(`${API}/api/trips`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const trips = await resp.json();
        list.innerHTML = "";
        if (trips.length === 0) {
          noTrips.classList.remove("hidden");
          return;
        }
        noTrips.classList.add("hidden");
        trips.forEach((t) => {
          const btn = document.createElement("button");
          btn.className = `px-4 py-3 rounded-xl border text-sm text-left transition-all ${
            currentTrip === t.id
              ? "bg-pink-50 border-pink-200 text-pink-700 font-medium shadow-sm"
              : "bg-white/70 border-gray-200 text-gray-500 hover:text-gray-800 hover:border-pink-200 hover:shadow-sm"
          }`;
          btn.innerHTML = `
            <div class="font-medium">${esc(t.label)}</div>
            <div class="text-xs text-gray-400 mt-0.5">${t.photo_count} 張相 · ${fmtDate(t.updated)}</div>`;
          btn.addEventListener("click", () => selectTrip(t.id));
          list.appendChild(btn);
        });
      } catch (err) {
        console.error("loadTrips:", err);
        list.innerHTML = `<p class="text-red-400 text-sm">⚠️ 無法連接 API：${esc(err.message)}</p>`;
      }
    }

    // ── Select trip ──
    function selectTrip(tripId) {
      currentTrip = tripId;
      // Update URL without reload
      const url = new URL(location);
      url.searchParams.set("trip", tripId);
      history.replaceState(null, "", url);
      // Show upload + photo sections
      $("#section-upload").classList.remove("hidden");
      $("#section-photos").classList.remove("hidden");
      // Refresh trip list styling
      loadTrips();
      // Load photos
      loadPhotos(tripId);
    }

    // ── Load photos ──
    async function loadPhotos(tripId) {
      const grid = $("#photo-grid");
      const empty = $("#photo-empty");
      grid.innerHTML = "";
      try {
        const resp = await fetch(`${API}/api/photos/${encodeURIComponent(tripId)}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const photos = await resp.json();
        // Normalize: API returns relative paths, prepend API base for cross-origin
        currentPhotos = photos.map(p => ({
          ...p,
          url: p.url.startsWith("http") ? p.url : `${API}${p.url}`,
          thumb_url: p.thumb_url ? (p.thumb_url.startsWith("http") ? p.thumb_url : `${API}${p.thumb_url}`) : null,
        }));
        $("#photo-count").textContent = `${photos.length} 張相`;

        if (photos.length === 0) {
          empty.classList.remove("hidden");
          grid.classList.add("hidden");
          return;
        }
        empty.classList.add("hidden");
        grid.classList.remove("hidden");

        photos.forEach((p, idx) => {
          const card = document.createElement("div");
          card.className = "photo-card fade-in";
          card.style.animationDelay = `${idx * 0.03}s`;
          card.innerHTML = `
            <button class="del-btn" title="刪除" data-key="${esc(p.key)}">✕</button>
            <img src="${esc(p.thumb_url)}" alt="${esc(p.caption)}" loading="lazy" data-idx="${idx}">
            ${p.caption ? `<p class="text-xs text-gray-400 mt-1 px-1 truncate">${esc(p.caption)}</p>` : ""}`;
          // Click photo → lightbox
          card.querySelector("img").addEventListener("click", () => openLightbox(idx));
          // Delete button
          card.querySelector(".del-btn").addEventListener("click", (e) => {
            e.stopPropagation();
            deletePhoto(p.key);
          });
          grid.appendChild(card);
        });
        $("#status").textContent = `${tripId} · ${photos.length} 張相`;
      } catch (err) {
        console.error("loadPhotos:", err);
        grid.innerHTML = `<p class="text-red-400 text-sm col-span-full">⚠️ 載入失敗：${esc(err.message)}</p>`;
      }
    }

    // ── Delete photo ──
    async function deletePhoto(key) {
      if (!confirm("確定刪除呢張相？")) return;
      try {
        const resp = await fetch(`${API}/api/photo/${encodeURIComponent(currentTrip)}/${encodeURIComponent(key)}`, {
          method: "DELETE",
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const remaining = data.remaining || 0;

        // Show undo toast with 30s timeout
        const dismissToast = toastHTML(
          `<span>已刪除 1 張相</span>
           <button id="undo-btn" class="ml-3 px-3 py-1 rounded-lg bg-pink-100 hover:bg-pink-200 text-pink-700 text-xs font-medium transition">
             ↩️ Undo
           </button>`,
          30000  // 30s auto-dismiss
        );

        // Quick refresh grid
        loadPhotos(currentTrip);
        loadTrips();

        // Attach undo handler (after DOM update)
        setTimeout(() => {
          const undoBtn = document.getElementById("undo-btn");
          if (undoBtn) {
            undoBtn.addEventListener("click", async () => {
              // Dismiss the toast
              if (dismissToast) dismissToast();
              try {
                const restoreResp = await fetch(
                  `${API}/api/photo/${encodeURIComponent(currentTrip)}/${encodeURIComponent(key)}/restore`,
                  { method: "POST" }
                );
                if (!restoreResp.ok) throw new Error(`HTTP ${restoreResp.status}`);
                toast("✅ 已還原");
                loadPhotos(currentTrip);
                loadTrips();
              } catch (err) {
                toast(`❌ 還原失敗：${err.message}`);
              }
            });
          }

          // If not undone within 30s → permanent delete
          const toastEl = document.getElementById("undo-toast");
          if (toastEl) {
            const fadeTimer = setTimeout(async () => {
              try {
                await fetch(
                  `${API}/api/trash/${encodeURIComponent(currentTrip)}/${encodeURIComponent(key)}`,
                  { method: "DELETE" }
                );
              } catch {
                // Silently fail if already restored or network issue
              }
            }, 30000);

            // Cancel permanent delete if undo clicked
            const checkUndo = setInterval(() => {
              if (!document.getElementById("undo-toast")) {
                clearTimeout(fadeTimer);
                clearInterval(checkUndo);
              }
            }, 500);
          }
        }, 50);
      } catch (err) {
        toast(`❌ 刪除失敗：${err.message}`);
      }
    }

    // ── Lightbox ──
    function openLightbox(idx) {
      lightboxIdx = idx;
      showLightboxImage();
      updateDots();
      $("#lightbox").style.display = "flex";
      $("#lightbox").classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }
    function closeLightbox() {
      $("#lightbox").style.display = "none";
      $("#lightbox").classList.add("hidden");
      document.body.style.overflow = "";
      lightboxIdx = -1;
    }
    function showLightboxImage() {
      const p = currentPhotos[lightboxIdx];
      if (!p) return;
      const img = $("#lb-img");
      img.style.transform = "scale(0.95)";
      img.src = p.url;
      img.onload = () => { img.style.transform = "scale(1)"; };
      $("#lb-caption").textContent = p.caption || "";
      updateDots();
    }
    function updateDots() {
      const dots = $("#lb-dots");
      dots.innerHTML = "";
      currentPhotos.forEach((_, i) => {
        const span = document.createElement("span");
        if (i === lightboxIdx) span.className = "active";
        dots.appendChild(span);
      });
    }
    function lightboxPrev(e) { e?.stopPropagation(); if (lightboxIdx > 0) { lightboxIdx--; showLightboxImage(); } }
    function lightboxNext(e) { e?.stopPropagation(); if (lightboxIdx < currentPhotos.length - 1) { lightboxIdx++; showLightboxImage(); } }

    $("#lb-close").addEventListener("click", closeLightbox);
    $("#lightbox").addEventListener("click", (e) => {
      if (e.target === $("#lightbox")) closeLightbox();
    });
    $("#lb-prev").addEventListener("click", lightboxPrev);
    $("#lb-next").addEventListener("click", lightboxNext);

    // ── Lightbox swipe (mobile) ──
    let touchStartX = 0;
    $("#lightbox").addEventListener("touchstart", (e) => { touchStartX = e.touches[0].clientX; }, {passive: true});
    $("#lightbox").addEventListener("touchend", (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 60) {
        if (dx < 0) lightboxNext();
        else lightboxPrev();
      }
    });

    // ── Keyboard nav ──
    document.addEventListener("keydown", (e) => {
      if (lightboxIdx < 0) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowLeft") lightboxPrev(e);
      if (e.key === "ArrowRight") lightboxNext(e);
    });

    // ── Mobile hamburger ──
    $("#hamburger").addEventListener("click", () => {
      $("#nav-links").classList.toggle("open");
    });

    // ── Upload ──
    const btnUpload = $("#btn-upload");
    const uploadPanel = $("#upload-panel");
    const dropZone = $("#drop-zone");
    const fileInput = $("#file-input");
    const previewRow = $("#preview-row");
    const btnDoUpload = $("#btn-do-upload");
    const uploadProgress = $("#upload-progress");
    const fileCount = $("#file-count");

    btnUpload.addEventListener("click", () => {
      const hidden = uploadPanel.classList.toggle("hidden");
      if (!hidden) {
        uploadPanel.scrollIntoView({ behavior: "smooth" });
      }
    });

    dropZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => handleFiles(fileInput.files));

    // Drag & drop
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      handleFiles(e.dataTransfer.files);
    });

    function handleFiles(files) {
      selectedFiles = Array.from(files).filter((f) => f.type.startsWith("image/"));
      if (selectedFiles.length === 0) {
        fileCount.textContent = "⚠️ 請選擇圖片檔案";
        return;
      }
      fileCount.textContent = `已選 ${selectedFiles.length} 個檔案`;
      btnDoUpload.disabled = false;

      // Show previews
      previewRow.innerHTML = "";
      selectedFiles.forEach((f) => {
        const url = URL.createObjectURL(f);
        const thumb = document.createElement("img");
        thumb.src = url;
        thumb.className = "w-16 h-16 object-cover rounded-lg border border-white/10";
        thumb.title = f.name;
        previewRow.appendChild(thumb);
      });
    }

    btnDoUpload.addEventListener("click", async () => {
      if (selectedFiles.length === 0 || !currentTrip) return;
      btnDoUpload.disabled = true;
      const progWrap = $("#upload-progress-wrap");
      const progText = $("#upload-progress");
      const progBar = $("#progress-bar");
      progWrap.classList.remove("hidden");
      progBar.style.width = "0%";

      let done = 0;
      let failed = 0;
      const uploadedPhotos = [];  // { url, thumb_url, caption, key }

      for (const file of selectedFiles) {
        const pct = Math.round((done / selectedFiles.length) * 100);
        progText.textContent = `⬆️ 上載中… ${done + 1}/${selectedFiles.length}`;
        progBar.style.width = `${pct}%`;
        try {
          const form = new FormData();
          form.append("file", file);
          form.append("caption", $("#upload-caption").value.trim());
          form.append("day", $("#upload-day").value || "0");
          form.append("spot", $("#upload-spot").value.trim());

          const resp = await fetch(`${API}/api/upload/${encodeURIComponent(currentTrip)}`, {
            method: "POST",
            body: form,
          });
          if (!resp.ok) {
            const errData = await resp.json().catch(() => ({}));
            throw new Error(errData.detail || `HTTP ${resp.status}`);
          }
          const uploadData = await resp.json();
          uploadedPhotos.push({
            url: `${API}${uploadData.url}`,
            thumb_url: uploadData.thumb_url ? `${API}${uploadData.thumb_url}` : `${API}${uploadData.url}`,
            caption: $("#upload-caption").value.trim(),
            key: uploadData.key,
          });
          done++;
          progBar.style.width = `${Math.round((done / selectedFiles.length) * 100)}%`;
        } catch (err) {
          failed++;
          console.error("Upload failed:", file.name, err);
        }
      }

      progWrap.classList.add("hidden");
      btnDoUpload.disabled = false;
      selectedFiles = [];
      fileCount.textContent = "未選擇檔案";
      previewRow.innerHTML = "";

      if (done > 0) {
        toast(`✅ 成功上載 ${done} 張相` + (failed > 0 ? ` · ${failed} 張失敗` : ""));
        // Show upload preview lightbox
        showUploadPreview(uploadedPhotos);
      } else {
        toast(`❌ 上載失敗`);
      }

      // Refresh
      loadPhotos(currentTrip);
      loadTrips();
    });

    // ── Upload Preview Lightbox ──
    function showUploadPreview(photos) {
      if (photos.length === 0) return;

      // Build preview modal
      const overlay = document.createElement("div");
      overlay.className = "lightbox";
      overlay.style.display = "flex";
      overlay.style.flexDirection = "column";
      overlay.style.gap = "16px";
      overlay.id = "upload-preview";

      const closeBtn = document.createElement("span");
      closeBtn.className = "close";
      closeBtn.textContent = "×";
      closeBtn.style.position = "absolute";
      closeBtn.style.top = "16px";
      closeBtn.style.right = "20px";
      closeBtn.style.fontSize = "36px";
      closeBtn.style.color = "white";
      closeBtn.style.opacity = "0.5";
      closeBtn.style.cursor = "pointer";
      closeBtn.style.zIndex = "1";
      closeBtn.addEventListener("click", () => closeUploadPreview());

      const title = document.createElement("p");
      title.textContent = `✅ 成功上載 ${photos.length} 張相`;
      title.style.color = "rgba(255,255,255,0.9)";
      title.style.fontSize = "16px";
      title.style.fontWeight = "500";

      const grid = document.createElement("div");
      grid.style.display = "flex";
      grid.style.flexWrap = "wrap";
      grid.style.gap = "12px";
      grid.style.justifyContent = "center";
      grid.style.maxWidth = "90vw";
      grid.style.maxHeight = "70vh";
      grid.style.overflowY = "auto";

      photos.forEach((p, i) => {
        const wrapper = document.createElement("div");
        wrapper.style.display = "flex";
        wrapper.style.flexDirection = "column";
        wrapper.style.alignItems = "center";
        wrapper.style.gap = "4px";
        wrapper.style.cursor = "pointer";
        wrapper.addEventListener("click", () => {
          // Open in main lightbox
          closeUploadPreview();
          setTimeout(() => {
            // Find this photo in currentPhotos to get correct idx
            const idx = currentPhotos.findIndex(ph => ph.key === p.key);
            if (idx >= 0) openLightbox(idx);
          }, 300);
        });

        const img = document.createElement("img");
        img.src = p.thumb_url;
        img.style.width = "160px";
        img.style.height = "120px";
        img.style.objectFit = "cover";
        img.style.borderRadius = "10px";
        img.style.border = "1px solid rgba(255,255,255,0.1)";
        img.style.transition = "transform 0.2s";
        img.addEventListener("mouseenter", () => { img.style.transform = "scale(1.05)"; });
        img.addEventListener("mouseleave", () => { img.style.transform = "scale(1)"; });

        const label = document.createElement("span");
        label.textContent = p.caption || `📷 #${i + 1}`;
        label.style.color = "rgba(255,255,255,0.5)";
        label.style.fontSize = "11px";
        label.style.maxWidth = "160px";
        label.style.textAlign = "center";
        label.style.overflow = "hidden";
        label.style.textOverflow = "ellipsis";
        label.style.whiteSpace = "nowrap";

        wrapper.appendChild(img);
        wrapper.appendChild(label);
        grid.appendChild(wrapper);
      });

      const dimmedBg = document.createElement("div");
      dimmedBg.id = "upload-preview-bg";
      dimmedBg.style.position = "fixed";
      dimmedBg.style.inset = "0";
      dimmedBg.style.zIndex = "59";
      dimmedBg.style.background = "rgba(0,0,0,0.7)";
      dimmedBg.addEventListener("click", () => closeUploadPreview());

      overlay.appendChild(closeBtn);
      overlay.appendChild(title);
      overlay.appendChild(grid);
      document.body.appendChild(dimmedBg);
      document.body.appendChild(overlay);
      document.body.style.overflow = "hidden";

      function closeUploadPreview() {
        overlay.remove();
        dimmedBg.remove();
        document.body.style.overflow = "";
      }
    }

    // ── Toast ──
    function toast(msg) {
      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = "0"; t.style.transition = "opacity 0.3s"; }, 2500);
      setTimeout(() => t.remove(), 2900);
    }

    // toastHTML — supports inner HTML (for undo button) + returns dismiss function
    function toastHTML(html, durationMs) {
      // Remove any existing undo toast
      const old = document.getElementById("undo-toast");
      if (old) old.remove();

      const t = document.createElement("div");
      t.className = "toast";
      t.id = "undo-toast";
      t.style.display = "flex";
      t.style.alignItems = "center";
      t.innerHTML = html;
      document.body.appendChild(t);

      let dismissed = false;
      const dismiss = () => {
        if (dismissed) return;
        dismissed = true;
        t.style.opacity = "0";
        t.style.transition = "opacity 0.3s";
        setTimeout(() => t.remove(), 300);
      };

      setTimeout(dismiss, durationMs);
      return dismiss;
    }

    // ── Helpers ──
    function esc(s) {
      if (!s) return "";
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function fmtDate(d) {
      if (!d) return "";
      try {
        return new Date(d).toLocaleDateString("zh-HK", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
      } catch { return d.slice(0,10); }
    }

    // ── Go ──
    init();
  })();
  </script>
</body>
</html>
