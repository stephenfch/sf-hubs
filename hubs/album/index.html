<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album Hub 🖼️ | SF-HUBS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>">
  <!-- Phase 1.1: Self-hosted Tailwind (甩 CDN) -->
  <link rel="stylesheet" href="output.css">
  <link rel="preconnect" href="https://album.sf-hubs.dev">
  <link rel="dns-prefetch" href="https://album.sf-hubs.dev">
  <!-- Phase 6: BlurHash decode for progressive image placeholders -->
  <script src="https://cdn.jsdelivr.net/npm/blurhash@2.0.5/dist/blurhash.min.js" defer></script>
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       Album Hub — Design System: Soft Glass + Warm Minimal
       CSS Custom Properties · Glass Effects · Badges · Hover · Animations
       ═══════════════════════════════════════════════════════════════════════ */

    /* ── CSS Custom Properties (Light) ── */
    :root {
      --bg: #f4f1ea;
      --bg-grad-1: #faf7f0;
      --bg-grad-2: #ece6da;
      --surface: rgba(255, 255, 255, 0.55);
      --surface-solid: #ffffff;
      --card: rgba(255, 255, 255, 0.62);
      --card-border: rgba(255, 255, 255, 0.8);
      --text: #2b2620;
      --text-soft: #6b6358;
      --text-faint: #9a9183;
      --primary: #e8552d;
      --primary-soft: #f6b9a4;
      --accent: #2f6f6a;
      --accent-soft: #bcdad6;
      --badge-d: #e8552d;
      --badge-spot: rgba(43, 38, 32, 0.72);
      --shadow-soft: 0 8px 24px rgba(80, 60, 40, 0.10);
      --shadow-lift: 0 18px 48px rgba(80, 60, 40, 0.22);
      --radius: 18px;
      --radius-sm: 12px;
      --font-ui: -apple-system, "Segoe UI", "PingFang HK", "Hiragino Sans", Roboto, sans-serif;
      --font-display: "Segoe UI Semibold", var(--font-ui);
    }

    /* ── Custom Properties (Dark) ── */
    [data-theme="dark"] {
      --bg: #14110d;
      --bg-grad-1: #1a1611;
      --bg-grad-2: #0e0c09;
      --surface: rgba(255, 255, 255, 0.05);
      --surface-solid: #1c1813;
      --card: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.10);
      --text: #f2ece1;
      --text-soft: #b9af9f;
      --text-faint: #7d7464;
      --primary: #ff6b3d;
      --primary-soft: #5a2a1c;
      --accent: #4fb3a8;
      --accent-soft: #1f3f3c;
      --badge-d: #ff6b3d;
      --badge-spot: rgba(0, 0, 0, 0.55);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.40);
      --shadow-lift: 0 20px 60px rgba(0, 0, 0, 0.60);
    }

    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-ui);
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 80% -10%, var(--bg-grad-1), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, var(--accent-soft), transparent 55%),
        linear-gradient(160deg, var(--bg-grad-1), var(--bg-grad-2));
      background-attachment: fixed;
      min-height: 100vh;
      transition: background .4s ease, color .3s ease, border-color .3s ease;
    }

    /* ── Glass Nav ── */
    #main-nav {
      transition: background .35s ease, box-shadow .35s ease, border-color .3s ease;
    }
    #main-nav {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      border-bottom: 1px solid rgba(255,255,255,0.6);
    }
    [data-theme="dark"] #main-nav {
      background: rgba(28, 24, 19, 0.65);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    }

    /* ── Theme Toggle ── */
    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(80,60,40,0.15);
      background: rgba(255,255,255,0.6);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all .25s cubic-bezier(0.16,1,0.3,1);
      line-height: 1;
    }
    .theme-toggle:hover {
      background: rgba(232,85,45,0.08);
      border-color: rgba(232,85,45,0.3);
      transform: rotate(15deg);
    }
    .theme-toggle:active { transform: scale(0.9) rotate(30deg); }
    [data-theme="dark"] .theme-toggle {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
    }
    [data-theme="dark"] .theme-toggle:hover {
      background: rgba(255,107,61,0.12);
      border-color: rgba(255,107,61,0.3);
    }

    /* ── Photo Grid ── */
    .photo-grid {
      columns: 4 200px;
      column-gap: 18px;
    }
    @media (max-width: 1100px) { .photo-grid { columns: 3; } }
    @media (max-width: 760px)  { .photo-grid { columns: 2; column-gap: 12px; } }
    @media (max-width: 480px)  { .photo-grid { columns: 1; } }

    /* ── Photo Card ── */
    .photo-card {
      position: relative;
      break-inside: avoid;
      margin-bottom: 18px;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: transform .28s cubic-bezier(.2,.8,.2,1), box-shadow .28s ease, background .3s ease, border-color .3s ease;
      opacity: 0;
      transform: translateY(20px);
      /* Phase 4: Skip off-screen rendering for faster initial load */
      content-visibility: auto;
      contain-intrinsic-size: auto 300px;
    }
    .photo-card.revealed {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.5s cubic-bezier(0.16,1,0.3,1),
                  transform 0.5s cubic-bezier(0.16,1,0.3,1),
                  background .3s ease, border-color .3s ease;
    }
    .photo-card:hover {
      transform: translateY(-6px) scale(1.012);
      box-shadow: var(--shadow-lift);
    }
    .photo-card img {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      transition: transform .5s ease, filter .3s ease, opacity .4s cubic-bezier(0.16,1,0.3,1);
      position: relative;
      z-index: 1;
      opacity: 0;
      /* Background-color as fallback while blurhash canvas loads */
      background: var(--surface);
    }
    .photo-card img.img-loaded {
      opacity: 1;
    }
    /* BlurHash placeholder canvas — sits behind img, shows colors instantly */
    .photo-card .blurhash-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      transition: opacity .6s cubic-bezier(0.16,1,0.3,1);
    }
    .photo-card .blurhash-canvas.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .photo-card:hover img {
      transform: scale(1.06);
      filter: saturate(1.08);
    }
    /* ── Badge Row ── */
    .badge-row {
      position: absolute;
      left: 10px;
      top: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 2;
    }
    .badge-day {
      background: var(--badge-d);
      color: #fff;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .03em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .badge-spot {
      background: var(--badge-spot);
      color: #fff;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 500;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      transition: transform .2s ease;
      max-width: calc(100% - 50px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .photo-card:hover .badge-spot { transform: translateY(-2px); }

    /* ── Delete Button ── */
    .del-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 3;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      opacity: 0;
      transition: opacity .25s ease, background .2s ease, transform .2s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .photo-card:hover .del-btn { opacity: 1; }
    .del-btn:hover {
      background: rgba(220,60,40,0.75);
      transform: scale(1.15);
    }
    @media (hover: none) {
      .del-btn { opacity: 1; }
      .photo-card:hover { transform: none; box-shadow: var(--shadow-soft); }
      .photo-card:hover img { transform: none; filter: none; }
      .photo-card:hover .badge-spot { transform: none; }
    }

    /* ── Caption ── */
    .photo-card p {
      padding: 8px 10px 10px;
      margin: 0;
      font-size: 13px;
      color: var(--text-soft);
      transition: color .3s ease;
    }
    .caption-text {
      margin: 4px 10px 10px;
      font-size: 12px;
      color: var(--text-soft);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color .3s ease;
    }

    /* ── Trip Buttons ── */
    .trip-btn {
      padding: 12px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
      background: var(--card);
      color: var(--text);
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: all .25s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: var(--shadow-soft);
      font-family: var(--font-ui);
    }
    .trip-btn:hover {
      background: var(--primary-soft);
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lift);
    }
    .trip-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 4px 16px rgba(232,85,45,0.25);
    }
    [data-theme="dark"] .trip-btn.active {
      background: var(--primary);
      box-shadow: 0 4px 20px rgba(255,107,61,0.2);
    }

    /* ── Upload Zone ── */
    #upload-panel {
      transition: background .3s ease, border-color .3s ease;
    }
    .upload-zone {
      border: 2px dashed rgba(232,85,45,0.3);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all .25s ease;
      background: var(--surface);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--primary);
      background: rgba(232,85,45,0.05);
      transform: translateY(-2px);
    }
    [data-theme="dark"] .upload-zone {
      border-color: rgba(255,107,61,0.25);
    }
    [data-theme="dark"] .upload-zone:hover {
      background: rgba(255,107,61,0.08);
      border-color: var(--primary);
    }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: var(--radius-sm);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transition: transform .15s ease;
      user-select: none;
      -webkit-user-select: none;
    }
    .lightbox img.zoomed { transform: scale(2.5); cursor: zoom-out; }
    .lightbox img.zoomed-more { transform: scale(4); cursor: zoom-out; }
    .lightbox .close {
      position: absolute;
      top: 16px;
      right: 24px;
      font-size: 32px;
      color: #fff;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity .2s;
      z-index: 1000;
      line-height: 1;
    }
    .lightbox .close:hover { opacity: 1; }
    .lightbox .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      color: #fff;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity .2s;
      padding: 12px;
      user-select: none;
    }
    .lightbox .nav:hover { opacity: 1; }
    .lightbox .prev { left: 12px; }
    .lightbox .next { right: 12px; }
    .lightbox .dots {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .lightbox .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background .2s;
    }
    .lightbox .dots span.active { background: #fff; }
    .lightbox .dots span:hover { background: rgba(255,255,255,0.6); }
    .lightbox .caption {
      margin-top: 10px;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      text-align: center;
      max-width: 80vw;
    }

    /* ── Skeleton Grid ── */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .skeleton-card {
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-soft);
    }
    .skeleton-img {
      aspect-ratio: 4 / 3;
      background: linear-gradient(100deg, transparent 20%, var(--accent-soft) 50%, transparent 80%);
      background-size: 200% 100%;
      animation: shimmer 1.3s infinite linear;
    }
    .skeleton-caption {
      height: 16px;
      margin: 10px 12px;
      border-radius: 6px;
      background: linear-gradient(100deg, transparent 20%, var(--accent-soft) 50%, transparent 80%);
      background-size: 200% 100%;
      animation: shimmer 1.3s infinite linear;
    }
    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(43,38,32,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      animation: toastBounce 0.35s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }
    [data-theme="dark"] .toast {
      background: rgba(242,236,225,0.88);
      color: #1a1611;
    }
    @keyframes toastBounce {
      0% { opacity: 0; transform: translateX(-50%) translateY(16px) scale(0.95); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }
    #undo-toast { animation: toastBounce 0.35s cubic-bezier(0.34,1.56,0.64,1); }

    /* ── Spinner ── */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--accent-soft);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Progress Bar ── */
    .progress-bar {
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      transition: width .3s ease;
    }

    /* ── Hamburger / Nav Links ── */
    .hamburger {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(80,60,40,0.12);
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s ease;
      line-height: 1;
    }
    .hamburger:hover {
      background: rgba(232,85,45,0.06);
      border-color: rgba(232,85,45,0.2);
    }
    [data-theme="dark"] .hamburger {
      border-color: rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
    }
    [data-theme="dark"] .hamburger:hover {
      background: rgba(255,107,61,0.1);
      border-color: rgba(255,107,61,0.2);
    }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .nav-links.open {
      display: flex;
      flex-direction: column;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 12px 16px;
      border-bottom: 1px solid rgba(80,60,40,0.08);
      z-index: 20;
    }
    .nav-links.open a { padding: 8px 0; }

    /* ── Meta Edit Inline ── */
    .meta-edit input:focus {
      border-color: var(--primary) !important;
      outline: 2px solid var(--primary-soft) !important;
      outline-offset: -1px;
    }

    /* ── Fade In Animation ── */
    .fade-in {
      animation: fadeIn 0.45s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Footer ── */
    footer { transition: border-color .3s ease, color .3s ease; }
    [data-theme="dark"] footer {
      border-color: rgba(255,255,255,0.05) !important;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(80,60,40,0.12);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(80,60,40,0.2); }
    [data-theme="dark"] ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
    }

    /* ── Backdrop-filter Fallback ── */
    @supports not ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
      .photo-card { background: var(--surface-solid); }
      #upload-panel { background: var(--surface-solid) !important; }
      #main-nav { background: var(--surface-solid) !important; }
      .trip-btn { background: var(--surface-solid); }
      .toast { background: rgba(43,38,32,0.95); }
      .lightbox { background: rgba(0,0,0,0.8); }
      .nav-links.open { background: var(--surface-solid); }
    }

    /* ── Phase 2.1: View Transitions for trip switch ── */
    ::view-transition-old(root),
    ::view-transition-new(root) { animation-duration: 0.25s; }
    ::view-transition-old(root) { animation: 0.25s ease-out both vt-fade-out; }
    ::view-transition-new(root) { animation: 0.25s ease-in both vt-fade-in; }
    @keyframes vt-fade-out { from { opacity: 1; } to { opacity: 0; } }
    @keyframes vt-fade-in  { from { opacity: 0; } to { opacity: 1; } }

    /* ── Phase 2.2: Caption clickable indicator ── */
    .caption-text {
      cursor: text;
      transition: background 0.15s ease;
      border-radius: 4px;
      padding: 8px 10px 10px;
    }
    .caption-text:hover {
      background: rgba(128,128,128,0.08);
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="bg-canvas" aria-hidden="true"></div>

  <!-- ═══ Glass Nav ═══ -->
  <nav id="main-nav" class="glass-nav">
    <div class="glass-nav-inner">
      <div class="flex items-center gap-2">
        <button class="hamburger" id="hamburger" title="Menu" aria-label="Menu">☰</button>
        <div class="nav-links" id="nav-links">
          <a href="../../" class="text-sm transition" style="color:var(--text-faint);text-decoration:none;">← SF-HUBS</a>
          <span style="color:var(--text-faint);opacity:0.5;">/</span>
          <span class="font-semibold flex items-center gap-1.5" style="color:var(--text);font-size:14px;">🖼️ Album Hub</span>
        </div>
      </div>
      <div class="nav-actions">
        <span style="color:var(--text-faint);font-size:11px;" id="status">載入中…</span>
        <button id="theme-toggle" class="theme-toggle" title="切換深色模式" aria-label="Toggle dark mode">🌙</button>
      </div>
    </div>
  </nav>

  <!-- ═══ Main ═══ -->
  <main class="max-w-6xl mx-auto px-6 py-8 pb-24">

    <!-- ── Trip Selector ── -->
    <section id="section-select" class="mb-8 fade-in">
      <h2 class="text-lg font-semibold mb-4 flex items-center gap-2" style="color:var(--text);">
        <span>📂</span> 選擇旅程
      </h2>
      <div id="trip-list" class="flex flex-wrap gap-3">
        <!-- rendered by JS -->
      </div>
      <div id="no-trips" class="hidden" style="color:var(--text-soft);font-size:13px;margin-top:1rem;">
        <p>📭 暫無相簿 — 上載第一張相就會自動建立 trip folder</p>
      </div>
    </section>

    <!-- ── Upload Bar ── -->

    <!-- ── Photo Grid ── -->

      <!-- Phase 2.3: Skeleton loading grid -->

        <!-- filled by JS -->
      </div>
      <div id="photo-grid" class="photo-grid hidden">
        <!-- rendered by JS -->
      </div>

  <!-- ═══ Lightbox (hidden) ═══ -->
  <div id="lightbox" class="lightbox hidden" style="display:none;">

  </footer>

  <!-- ═══════════════════════════════════════════════════════════════════════
       App Logic — Vanilla JS
       Phase 1+2: theme toggle + lazy-reveal + view-transitions + lightbox-zoom + skeleton
       ═══════════════════════════════════════════════════════════════════════ -->
  <script>
  (function () {
    "use strict";

    // ── Config ──
    const API = (() => {
      if (location.hostname === "sf-hubs.dev" || location.hostname.endsWith(".pages.dev")) {
        return "https://album.sf-hubs.dev";
      }
      return "http://127.0.0.1:5300";
    })();

    // ── State ──
    let currentTrip = null;
    let currentPhotos = [];
    let selectedFiles = [];
    let lightboxIdx = -1;
    let lazyObserver = null;
    let imgLazyObserver = null;     // Shared IntersectionObserver for lazy image src (reused across loads)
    let lightboxZoomLevel = 0;  // Phase 2.2: 0=normal, 1=2x, 2=3x
    let loadGeneration = 0;     // Debounce rapid trip switches

    // ── DOM refs ──
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    // ═════════════════════════════════════════════
    // Phase 1.2: Dark Mode Toggle
    // ═════════════════════════════════════════════
    function initTheme() {
      const toggle = $("#theme-toggle");
      const saved = localStorage.getItem("album-theme");
      if (saved) {
        document.documentElement.setAttribute("data-theme", saved);
      } else {
        // Respect system preference
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
      }
      updateThemeIcon();

      toggle.addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("album-theme", next);
        updateThemeIcon();
      });

      // Listen for system preference changes (only when no manual override)
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (e) => {
        if (!localStorage.getItem("album-theme")) {
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
          updateThemeIcon();
        }
      });
    }

    function updateThemeIcon() {
      const toggle = $("#theme-toggle");
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      toggle.textContent = isDark ? "☀️" : "🌙";
    }

    // ═════════════════════════════════════════════
    // Phase 1.3: IntersectionObserver lazy-reveal
    // ═════════════════════════════════════════════
    function initLazyReveal() {
      if (lazyObserver) lazyObserver.disconnect();
      lazyObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("revealed");
            lazyObserver.unobserve(entry.target);
          }
        });
      }, {
        rootMargin: "80px 0px",
        threshold: 0.05,
      });
    }

    function observeCards() {
      // CSS columns layout confuses IntersectionObserver positions.
      // Use getBoundingClientRect as reliable fallback for column grids.
      const cards = $$(".photo-card:not(.revealed)");
      cards.forEach((card) => {
        const rect = card.getBoundingClientRect();
        const vpHeight = window.innerHeight || document.documentElement.clientHeight;
        // Reveal if card top is within viewport + 200px margin, or use observer
        if (rect.top < vpHeight + 200) {
          card.classList.add("revealed");
        } else if (lazyObserver) {
          lazyObserver.observe(card);
        }
      });
    }

    // ═════════════════════════════════════════════
    // Phase 2.3: Skeleton loading grid (with debounce)
    // ═════════════════════════════════════════════
    let skeletonTimer = null;

    function showSkeleton() {
      // Debounce: only show skeleton if fetch takes > 250ms
      // Avoids flicker when API responds quickly (< 250ms)
      clearTimeout(skeletonTimer);
      skeletonTimer = setTimeout(() => {
        const grid = $("#skeleton-grid");
        grid.classList.remove("hidden");
        grid.innerHTML = "";
        for (let i = 0; i < 8; i++) {
          const card = document.createElement("div");
          card.className = "skeleton-card";
          card.innerHTML = `
            <div class="skeleton-img"></div>
            <div class="skeleton-caption"></div>
          `;
          grid.appendChild(card);
        }
        $("#photo-grid").classList.add("hidden");
        $("#photo-empty").classList.add("hidden");
      }, 250);
    }

    function hideSkeleton() {
      clearTimeout(skeletonTimer);
      skeletonTimer = null;
      $("#skeleton-grid").classList.add("hidden");
      $("#photo-grid").classList.remove("hidden");
    }

    // ═════════════════════════════════════════════
    // Phase 2.1: View Transitions helper
    // ═════════════════════════════════════════════
    function tripTransition(callback) {
      if (!document.startViewTransition) {
        callback();
        return;
      }
      document.startViewTransition(() => {
        callback();
      });
    }

    // ── Init ──
    async function init() {
      initTheme();
      initLazyReveal();   // phase 1.3: IntersectionObserver for below-fold card reveal

      const params = new URLSearchParams(location.search);
      const tripParam = params.get("trip");

      await loadTrips();
      if (tripParam) {
        selectTrip(tripParam);
      }

      $("#status").textContent = `API: ${API}`;
    }

    // ── Load trips ──
    async function loadTrips() {
      const list = $("#trip-list");
      const noTrips = $("#no-trips");
      try {
        const resp = await fetch(`${API}/api/trips`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const trips = await resp.json();
        list.innerHTML = "";
        if (trips.length === 0) {
          noTrips.classList.remove("hidden");
          return;
        }
        noTrips.classList.add("hidden");
        trips.forEach((t) => {
          const btn = document.createElement("button");
          const isActive = currentTrip === t.id;
          btn.className = `trip-btn px-4 py-3 rounded-xl text-sm text-left ${isActive ? "active" : ""}`;
          btn.setAttribute("data-trip-id", t.id);
          btn.innerHTML = `
            <div class="font-medium">${esc(t.label)}</div>
            <div class="text-xs opacity-60 mt-0.5">${t.photo_count} 張相 · ${fmtDate(t.updated)}</div>`;
          btn.addEventListener("click", () => selectTrip(t.id));
          // Phase 6: hover prefetch — preload photos on mouse enter for instant switch
          btn.addEventListener("mouseenter", () => {
            if (t.id !== currentTrip) {
              fetch(`${API}/api/photos/${encodeURIComponent(t.id)}`, { priority: "low" }).catch(() => {});
            }
          }, { once: true });
          list.appendChild(btn);
        });
      } catch (err) {
        console.error("loadTrips:", err);
        list.innerHTML = `<p style="color:var(--primary);font-size:13px;">⚠️ 無法連接 API：${esc(err.message)}</p>`;
      }
    }

    // ── Select trip ──
    function selectTrip(tripId) {
      currentTrip = tripId;
      const url = new URL(location);
      url.searchParams.set("trip", tripId);
      history.replaceState(null, "", url);

      $("#section-upload").classList.remove("hidden");
      $("#section-photos").classList.remove("hidden");

      // Phase 2.1: View Transition on trip switch
      tripTransition(() => {
        loadTrips();
        loadPhotos(tripId);
      });
    }

    // ── Load photos (with batch progressive render) ──
    async function loadPhotos(tripId) {
      const gen = ++loadGeneration;   // Phase 6: race guard for rapid trip switches
      // Disconnect stale observers from previous loadPhotos() call
      if (typeof scrollObserver !== 'undefined' && scrollObserver) scrollObserver.disconnect();
      // imgLazyObserver is shared and reused (no need to disconnect)
      const grid = $("#photo-grid");
      const empty = $("#photo-empty");
      grid.innerHTML = "";

      // Phase 2.3: Show skeleton during fetch
      showSkeleton();

      try {
        const resp = await fetch(`${API}/api/photos/${encodeURIComponent(tripId)}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        if (gen !== loadGeneration) return;   // stale response, abort
        const photos = await resp.json();
        currentPhotos = photos.map(p => ({
          ...p,
          url: p.url.startsWith("http") ? p.url : `${API}${p.url}`,
          thumb_url: p.thumb_url
            ? (p.thumb_url.startsWith("http") ? p.thumb_url : `${API}${p.thumb_url}`)
            : (p.url.startsWith("http") ? p.url : `${API}${p.url}`),
        }));
        $("#photo-count").textContent = `${photos.length} 張相`;

        hideSkeleton();

        if (photos.length === 0) {
          empty.classList.remove("hidden");
          grid.classList.add("hidden");
          return;
        }
        empty.classList.add("hidden");
        grid.classList.remove("hidden");

        // ── Batch render: first 12 immediately, rest in batches of 12 via scroll ──
        const BATCH_SIZE = 12;
        let renderIdx = 0;
        let scrollObserver = null;

        // Phase 6: reuse imgLazyObserver — disconnect stale then re-init
        if (imgLazyObserver) imgLazyObserver.disconnect();
        imgLazyObserver = new IntersectionObserver((entries, obs) => {
          for (const entry of entries) {
            if (entry.isIntersecting) {
              obs.unobserve(entry.target);
              const t = entry.target;
              if (t.dataset.src) {
                t.src = t.dataset.src;
                if (t.decode) {
                  t.decode().then(() => {
                    t.classList.add("img-loaded");
                    const blrCvs = t.parentElement.querySelector(".blurhash-canvas");
                    if (blrCvs) blrCvs.classList.add("fade-out");
                  }).catch(() => { t.classList.add("img-loaded"); });
                } else {
                  t.classList.add("img-loaded");
                }
              }
            }
          }
        }, { rootMargin: "200px" });

        function renderBatch() {
          const batchEnd = Math.min(renderIdx + BATCH_SIZE, currentPhotos.length);
          const isInitialBatch = renderIdx === 0;
          for (let idx = renderIdx; idx < batchEnd; idx++) {
            const p = currentPhotos[idx];
            const card = document.createElement("div");
            card.className = "photo-card lazy-load";
            const isViewport = idx < 6;
            const dayBadge = p.day > 0 ? `<span class="badge-day">D${esc(p.day)}</span>` : "";
            const spotBadge = p.classifying
              ? `<span class="badge-spot" style="background:rgba(99,102,241,0.5);">⏳ classifying...</span>`
              : (p.spot
                ? (p.spot === "unknown" ? `<span class="badge-spot" style="background:rgba(150,150,150,0.5);">❔ unknown</span>`
                                        : `<span class="badge-spot">${esc(p.spot)}</span>`)
                : `<span class="badge-spot" style="background:rgba(150,150,150,0.5);">❔ unknown</span>`);
            const badges = (dayBadge || spotBadge)
              ? `<div class="badge-row">${dayBadge}${spotBadge}</div>`
              : "";
            const blurhashAttr = p.blurhash ? ` data-blurhash="${escAttr(p.blurhash)}"` : '';
            const blurhashCanvas = `<canvas class="blurhash-canvas"${blurhashAttr} width="480" height="360"></canvas>`;
            const fetchPrio = isViewport ? ' fetchpriority="high"' : '';
            // Phase 6: first batch uses src directly (immediate load), keeps blurhash + decode fade-in
            const imgSrc = isInitialBatch
              ? `src="${escUrl(p.thumb_url)}"`
              : `data-src="${escUrl(p.thumb_url)}"`;
            card.innerHTML = `
              <button class="del-btn" title="刪除" data-key="${escAttr(p.key)}">✕</button>
              ${badges}
              ${blurhashCanvas}
              <img ${imgSrc} alt="${escAttr(p.caption)}" width="480" data-idx="${idx}"${fetchPrio}>
              ${p.caption ? `<p class="caption-text">${esc(p.caption)}</p>` : `<p class="caption-text caption-placeholder" style="color:var(--text-faint);font-size:11px;">Click to add caption</p>`}`;
            card.querySelector("img").addEventListener("click", () => openLightbox(idx));
            card.querySelector(".del-btn").addEventListener("click", (e) => {
              e.stopPropagation();
              deletePhoto(p.key);
            });
            const captionEl = card.querySelector(".caption-text");
            if (captionEl) {
              captionEl.addEventListener("click", (e) => {
                e.stopPropagation();
                startEditMeta(card, p);
              });
            }
            makeBadgeEditable(card, p);
            grid.appendChild(card);

            // ── Phase 6: BlurHash decode into canvas ──
            const canvas = card.querySelector(".blurhash-canvas");
            if (canvas && p.blurhash && typeof blurhash !== 'undefined') {
              try {
                const pixels = blurhash.decode(p.blurhash, 32, 24);
                canvas.width = 32;
                canvas.height = 24;
                const ctx = canvas.getContext("2d");
                const imageData = ctx.createImageData(32, 24);
                imageData.data.set(pixels);
                ctx.putImageData(imageData, 0, 0);
              } catch (e) {}
            }

            // ── Phase 6: img.decode() fade-in — both initial & lazy batches ──
            const img = card.querySelector("img");
            if (isInitialBatch) {
              // First batch: img already has src set, just fade in via decode()
              if (img.decode) {
                img.decode().then(() => {
                  img.classList.add("img-loaded");
                  const blrCvs = card.querySelector(".blurhash-canvas");
                  if (blrCvs) blrCvs.classList.add("fade-out");
                }).catch(() => {
                  img.classList.add("img-loaded");
                });
              } else {
                img.classList.add("img-loaded");
              }
            } else {
              // Subsequent batches: shared IntersectionObserver lazy src + decode fade-in
              imgLazyObserver.observe(img);
            }
          }
          renderIdx = batchEnd;

          // Observe newly added cards for lazy-reveal
          observeCards();
        }

        // Render initial batch
        renderBatch();

        // Set up scroll observer for remaining batches
        if (renderIdx < currentPhotos.length) {
          scrollObserver = new IntersectionObserver((entries) => {
            for (const entry of entries) {
              if (entry.isIntersecting) {
                scrollObserver.unobserve(entry.target);
                renderBatch();
                if (renderIdx >= currentPhotos.length) {
                  scrollObserver.disconnect();
                  scrollObserver = null;
                } else {
                  // Re-observe the new last card so subsequent batches also load
                  const newLast = grid.querySelector('.photo-card:last-child');
                  if (newLast && scrollObserver) scrollObserver.observe(newLast);
                }
                break;
              }
            }
          }, { rootMargin: '400px 0px' });

          // Observe the last card; when user scrolls near it, load next batch
          const lastCard = grid.querySelector('.photo-card:last-child');
          if (lastCard) scrollObserver.observe(lastCard);
        }

        $("#status").textContent = `${tripId} · ${photos.length} 張相`;
      } catch (err) {
        console.error("loadPhotos:", err);
        hideSkeleton();
        grid.classList.remove("hidden");
        grid.innerHTML = `<p style="color:var(--primary);font-size:13px;grid-column:1/-1;">⚠️ 載入失敗：${esc(err.message)}</p>`;
      }
    }

    // ── Edit photo metadata ──
    async function updatePhotoMeta(key, day, spot, caption) {
      try {
        const form = new FormData();
        if (day > 0) form.append("day", String(day));
        if (spot) form.append("spot", spot);
        if (caption !== undefined) form.append("caption", caption);
        const resp = await fetch(`${API}/api/photo/${encodeURIComponent(currentTrip)}/${encodeURIComponent(key)}`, {
          method: "PATCH",
          body: form,
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return await resp.json();
      } catch (err) {
        toast(`❌ 更新失敗：${err.message}`);
        throw err;
      }
    }

    function makeBadgeEditable(card, photo) {
      const badgeRow = card.querySelector(".badge-row");
      if (!badgeRow) return;

      const spotBadge = badgeRow.querySelector(".badge-spot");
      if (spotBadge) {
        spotBadge.style.cursor = "pointer";
        spotBadge.style.pointerEvents = "auto";
        spotBadge.title = "Click to edit";
        spotBadge.addEventListener("click", (e) => {
          e.stopPropagation();
          startEditMeta(card, photo);
        });
      }

      const dayBadge = badgeRow.querySelector(".badge-day");
      if (dayBadge) {
        dayBadge.style.cursor = "pointer";
        dayBadge.style.pointerEvents = "auto";
        dayBadge.title = "Click to edit";
        dayBadge.addEventListener("click", (e) => {
          e.stopPropagation();
          startEditMeta(card, photo);
        });
      }

      if (!spotBadge && !dayBadge) {
        const editBtn = document.createElement("span");
        editBtn.className = "badge-spot";
        editBtn.textContent = "✏️ tag";
        editBtn.style.cursor = "pointer";
        editBtn.style.pointerEvents = "auto";
        editBtn.title = "Add tag";
        editBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          startEditMeta(card, photo);
        });
        badgeRow.appendChild(editBtn);
      }
    }

    function startEditMeta(card, photo) {
      const existing = card.querySelector(".meta-edit");
      if (existing) existing.remove();

      const badgeRow = card.querySelector(".badge-row");
      if (!badgeRow) return;

      badgeRow.style.display = "none";

      const editDiv = document.createElement("div");
      editDiv.className = "meta-edit";
      editDiv.style.cssText = `
        position: absolute; top: 8px; left: 8px; z-index: 10;
        display: flex; gap: 4px; flex-direction: column;
        background: rgba(255,255,255,0.95); padding: 8px 10px;
        border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        backdrop-filter: blur(8px); min-width: 140px;
      `;
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      if (isDark) {
        editDiv.style.background = "rgba(30,27,22,0.96)";
        editDiv.style.boxShadow = "0 4px 16px rgba(0,0,0,0.4)";
      }

      editDiv.innerHTML = `
        <div style="display:flex;gap:4px;align-items:center;font-size:11px;color:${isDark ? '#ccc' : '#666'};">
          <span>D</span>
          <input type="number" min="0" max="30" value="${photo.day || 0}"
            style="width:40px;padding:2px 4px;border:1px solid ${isDark ? '#444' : '#ddd'};border-radius:4px;font-size:11px;background:${isDark ? '#2a2520' : '#fff'};color:${isDark ? '#eee' : '#333'};">
          <span style="margin-left:4px;">📍</span>
          <input type="text" value="${esc(photo.spot || '')}" placeholder="unknown"
            style="flex:1;padding:2px 4px;border:1px solid ${isDark ? '#444' : '#ddd'};border-radius:4px;font-size:11px;min-width:60px;background:${isDark ? '#2a2520' : '#fff'};color:${isDark ? '#eee' : '#333'};">
        </div>
        <div style="display:flex;gap:4px;align-items:center;font-size:11px;color:${isDark ? '#ccc' : '#666'};margin-top:2px;">
          <span>📝</span>
          <input type="text" class="edit-caption-input" value="${esc(photo.caption || '')}" placeholder="Caption"
            style="flex:1;padding:2px 4px;border:1px solid ${isDark ? '#444' : '#ddd'};border-radius:4px;font-size:11px;background:${isDark ? '#2a2520' : '#fff'};color:${isDark ? '#eee' : '#333'};">
        </div>
        <div style="display:flex;gap:4px;justify-content:flex-end;margin-top:4px;">
          <button class="edit-save" style="padding:2px 10px;background:#6366f1;color:white;border:none;border-radius:6px;font-size:10px;cursor:pointer;">✓</button>
          <button class="edit-cancel" style="padding:2px 8px;background:${isDark ? '#444' : '#eee'};color:${isDark ? '#ccc' : '#666'};border:none;border-radius:6px;font-size:10px;cursor:pointer;">✕</button>
        </div>
      `;

      card.appendChild(editDiv);

      const spotInput = editDiv.querySelector('input[type="text"]');
      if (spotInput) setTimeout(() => spotInput.focus(), 100);

      // Phase 2.2: Enter key to save in all inputs
      editDiv.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') {
            ev.preventDefault();
            editDiv.querySelector('.edit-save').click();
          }
        });
      });

      editDiv.querySelector(".edit-save").addEventListener("click", async () => {
        const dayVal = parseInt(editDiv.querySelector('input[type="number"]').value) || 0;
        const spotVal = editDiv.querySelector('input[type="text"]').value.trim() || "unknown";
        const captionVal = editDiv.querySelector(".edit-caption-input").value;
        await updatePhotoMeta(photo.key, dayVal, spotVal, captionVal);
        toast(`✅ Day ${dayVal} · ${esc(spotVal)}` + (captionVal ? ` · ${esc(captionVal)}` : ""));
        editDiv.remove();
        badgeRow.style.display = "";
        // In-place update: refresh just this card's badges + caption without full reload
        photo.day = dayVal;
        photo.spot = spotVal;
        photo.caption = captionVal;
        const dayBadge = photo.day > 0 ? `<span class="badge-day">D${esc(photo.day)}</span>` : "";
        const spotBadge = photo.spot
          ? (photo.spot === "unknown" ? `<span class="badge-spot" style="background:rgba(150,150,150,0.5);">❔ unknown</span>`
                                       : `<span class="badge-spot">${esc(photo.spot)}</span>`)
          : `<span class="badge-spot" style="background:rgba(150,150,150,0.5);">❔ unknown</span>`;
        badgeRow.innerHTML = dayBadge + spotBadge;
        // Update caption text
        const captionEl = card.querySelector(".caption-text");
        if (captionVal) {
          if (captionEl) {
            captionEl.textContent = captionVal;
            captionEl.classList.remove("caption-placeholder");
            captionEl.style.color = "";
            captionEl.style.fontSize = "";
          } else {
            const p = document.createElement("p");
            p.className = "caption-text";
            p.textContent = captionVal;
            p.addEventListener("click", (e) => {
              e.stopPropagation();
              startEditMeta(card, photo);
            });
            card.appendChild(p);
          }
        } else {
          if (captionEl) {
            captionEl.textContent = "Click to add caption";
            captionEl.classList.add("caption-placeholder");
            captionEl.style.color = "var(--text-faint)";
            captionEl.style.fontSize = "11px";
          }
        }
      });

      editDiv.querySelector(".edit-cancel").addEventListener("click", () => {
        editDiv.remove();
        badgeRow.style.display = "";
      });

      // Close on outside click
      setTimeout(() => {
        const handler = (e) => {
          if (!editDiv.contains(e.target) && !badgeRow?.contains(e.target)) {
            editDiv.remove();
            if (badgeRow) badgeRow.style.display = "";
            document.removeEventListener("click", handler);
          }
        };
        document.addEventListener("click", handler);
      }, 0);
    }

    // ═════════════════════════════════════════════
    // Phase 2.2: Lightbox with double-tap zoom
    // ═════════════════════════════════════════════
    function openLightbox(idx) {
      lightboxIdx = idx;
      const p = currentPhotos[idx];
      const lb = $("#lightbox");
      const img = $("#lb-img");
      const caption = $("#lb-caption");
      const dots = $("#lb-dots");

      img.src = p.url;
      img.classList.remove("zoomed", "zoomed-more");
      lightboxZoomLevel = 0;
      caption.textContent = p.caption || "";
      lb.style.display = "flex";

      // Dots
      dots.innerHTML = "";
      if (currentPhotos.length > 1) {
        currentPhotos.forEach((_, i) => {
          const dot = document.createElement("span");
          if (i === idx) dot.classList.add("active");
          dot.addEventListener("click", () => openLightbox(i));
          dots.appendChild(dot);
        });
      }

      // Phase 2.2: Double-tap zoom
      let lastTap = 0;
      img.ondblclick = (e) => {
        e.preventDefault();
        cycleLightboxZoom(img);
      };

      document.body.style.overflow = "hidden";
    }

    function cycleLightboxZoom(img) {
      lightboxZoomLevel = (lightboxZoomLevel + 1) % 3;
      img.classList.remove("zoomed", "zoomed-more");
      if (lightboxZoomLevel === 1) img.classList.add("zoomed");
      if (lightboxZoomLevel === 2) img.classList.add("zoomed-more");
    }

    function closeLightbox() {
      const lb = $("#lightbox");
      lb.style.display = "none";
      document.body.style.overflow = "";
      lightboxIdx = -1;
      lightboxZoomLevel = 0;
    }

    function navigateLightbox(dir) {
      if (currentPhotos.length <= 1) return;
      let idx = lightboxIdx + dir;
      if (idx < 0) idx = currentPhotos.length - 1;
      if (idx >= currentPhotos.length) idx = 0;
      openLightbox(idx);
    }

    // ── Delete photo ──
    async function deletePhoto(key) {
      if (!confirm("確定刪除呢張相？")) return;
      const prevIdx = lightboxIdx;
      const tripAtDelete = currentTrip;   // Phase 6: capture trip to avoid race on rapid switch
      try {
        const resp = await fetch(`${API}/api/photo/${encodeURIComponent(tripAtDelete)}/${encodeURIComponent(key)}`, {
          method: "DELETE",
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        closeLightbox();
        toast("🗑️ 已刪除", {
          key: key,
          trip: tripAtDelete,
          label: "↩️ 復原",
          action: () => restorePhoto(tripAtDelete, key),
        });
        await loadPhotos(currentTrip);
        await loadTrips();
      } catch (err) {
        toast(`❌ 刪除失敗：${err.message}`);
      }
    }

    async function restorePhoto(tripId, key) {
      try {
        const resp = await fetch(`${API}/api/photo/${encodeURIComponent(tripId)}/${encodeURIComponent(key)}/restore`, {
          method: "POST",
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        toast("✅ 已復原");
        await loadPhotos(currentTrip);
        await loadTrips();
      } catch (err) {
        toast(`❌ 復原失敗：${err.message}`);
      }
    }

    // ── Utility functions ──
    function esc(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }
    function escAttr(str) {
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function escUrl(str) {
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function fmtDate(d) {
      if (!d) return "";
      const dt = new Date(d);
      return dt.toLocaleDateString("zh-Hant", { month: "short", day: "numeric" });
    }

    function toast(msg, undo) {
      const existing = document.querySelector(".toast");
      if (existing) existing.remove();
      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      if (undo) {
        const btn = document.createElement("button");
        btn.textContent = undo.label || "↩️ 復原";
        btn.style.cssText = "margin-left:12px;background:none;border:1px solid var(--accent-pink);color:var(--accent-pink);padding:2px 10px;border-radius:8px;font-size:12px;cursor:pointer;";
        btn.addEventListener("click", () => {
          clearTimeout(t._deleteTimer);
          t.remove();
          undo.action();
        });
        t.appendChild(btn);
        t.id = "undo-toast";
      }
      document.body.appendChild(t);
      // Phase 6: undoable toast → 30s auto permanent delete; normal toast → 3s auto dismiss
      const timeout = undo ? 30000 : 3000;
      const timer = setTimeout(async () => {
        t.remove();
        // If this was an undoable delete toast, call permanent delete API after timeout
        if (undo) {
          try {
            await fetch(`${API}/api/trash/${encodeURIComponent(undo.trip || currentTrip)}/${encodeURIComponent(undo.key)}`, {
              method: "DELETE",
            });
          } catch (e) {
            console.warn("permanent delete failed:", e);
          }
        }
      }, timeout);
      // Expose so users can cancel the timer via undo button
      t._deleteTimer = timer;
    }

    // ═════════════════════════════════════════════
    // Upload handlers
    // ═════════════════════════════════════════════
    $("#btn-upload").addEventListener("click", () => {
      const panel = $("#upload-panel");
      const wasHidden = panel.classList.contains("hidden");
      panel.classList.toggle("hidden");
      // Reset inputs every time panel opens to avoid stale tags
      if (wasHidden) {
        $("#upload-day").value = "";
        $("#upload-spot").value = "";
        $("#upload-caption").value = "";
        selectedFiles = [];
        $("#file-input").value = "";
        $("#file-count").textContent = "未選擇檔案";
        $("#preview-row").innerHTML = "";
      }
    });

    const dropZone = $("#drop-zone");
    const fileInput = $("#file-input");
    const fileCount = $("#file-count");
    const btnDoUpload = $("#btn-do-upload");
    const previewRow = $("#preview-row");

    dropZone.addEventListener("click", () => fileInput.click());

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("drag-over");
    });
    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("drag-over");
    });
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener("change", () => {
      handleFiles(fileInput.files);
    });

    function handleFiles(files) {
      const allFiles = Array.from(files);
      const allowedExts = ["jpg","jpeg","png","webp","heic","heif"];
      selectedFiles = allFiles.filter(f => {
        const ext = f.name.split(".").pop().toLowerCase();
        return allowedExts.includes(ext);
      });
      const skipped = allFiles.length - selectedFiles.length;
      if (skipped > 0) {
        toast(`⚠️ ${skipped} 個檔案不支援（僅 JPG/PNG/WebP/HEIC），已略過`);
      }
      fileCount.textContent = selectedFiles.length ? `${selectedFiles.length} 個檔案` : "未選擇檔案";
      btnDoUpload.disabled = selectedFiles.length === 0;

      previewRow.innerHTML = "";
      selectedFiles.slice(0, 12).forEach(f => {
        const reader = new FileReader();
        reader.onload = (e2) => {
          const img = document.createElement("img");
          img.src = e2.target.result;
          img.style.cssText = "width:60px;height:60px;object-fit:cover;border-radius:8px;";
          previewRow.appendChild(img);
        };
        reader.readAsDataURL(f);
      });
    }

    btnDoUpload.addEventListener("click", async () => {
      if (selectedFiles.length === 0) return;

      const dayVal = parseInt($("#upload-day").value) || 0;
      const spotVal = $("#upload-spot").value.trim();
      const captionVal = $("#upload-caption").value.trim();

      async function uploadFile(file) {
        const form = new FormData();
        form.append("file", file);
        if (dayVal > 0) form.append("day", String(dayVal));
        if (spotVal) form.append("spot", spotVal);
        if (captionVal) form.append("caption", captionVal);
        const resp = await fetch(`${API}/api/upload/${encodeURIComponent(currentTrip)}`, {
          method: "POST",
          body: form,
        });
        return resp.ok;
      }

      const wrap = $("#upload-progress-wrap");
      const bar = $("#progress-bar");
      const prog = $("#upload-progress");
      wrap.classList.remove("hidden");
      btnDoUpload.disabled = true;

      const concurrency = 3;
      let uploaded = 0;
      let failed = 0;
      let idx = 0;

      function updateProgress() {
        const total = uploaded + failed;
        const pct = Math.round((total / selectedFiles.length) * 100);
        bar.style.width = pct + "%";
        prog.textContent = `${total} / ${selectedFiles.length} · ✅ ${uploaded} ❌ ${failed}`;
      }

      async function worker() {
        while (idx < selectedFiles.length) {
          const file = selectedFiles[idx++];
          try {
            if (await uploadFile(file)) uploaded++; else failed++;
          } catch {
            failed++;
          }
          updateProgress();
        }
      }

      const workers = Array.from({ length: Math.min(concurrency, selectedFiles.length) }, () => worker());
      await Promise.all(workers);


      toast(`✅ ${uploaded} 張上載完成 — AI 分類中，請稍候…` + (failed > 0 ? ` · ${failed} 張失敗` : ""));

      // Reset inputs
      selectedFiles = [];
      fileInput.value = "";
      fileCount.textContent = "未選擇檔案";
      previewRow.innerHTML = "";
      btnDoUpload.disabled = true;
      wrap.classList.add("hidden");
      bar.style.width = "0%";
      $("#upload-day").value = "";
      $("#upload-spot").value = "";
      $("#upload-caption").value = "";

      // Wait for background classifier to finish (~3s for LLM round-trip)
      await new Promise(r => setTimeout(r, 3000));
      await loadPhotos(currentTrip);
      await loadTrips();
    });

    // ═════════════════════════════════════════════
    // Hamburger menu
    // ═════════════════════════════════════════════
    $("#hamburger").addEventListener("click", () => {
      $("#nav-links").classList.toggle("open");
    });

    // ═════════════════════════════════════════════
    // Keyboard events: lightbox navigation
    // ═════════════════════════════════════════════
    document.addEventListener("keydown", (e) => {
      if (lightboxIdx < 0) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowLeft") navigateLightbox(-1);
      if (e.key === "ArrowRight") navigateLightbox(1);
    });

    // Lightbox close via background click or ✕
    $("#lb-close").addEventListener("click", closeLightbox);
    $("#lightbox").addEventListener("click", (e) => {
      if (e.target === $("#lightbox")) closeLightbox();
    });
    $("#lb-prev").addEventListener("click", () => navigateLightbox(-1));
    $("#lb-next").addEventListener("click", () => navigateLightbox(1));

    // ═════════════════════════════════════════════
    // Init
    // ═════════════════════════════════════════════
    init();

  })();
</script>
</body>
</html>
